<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DebtOS — Control Financiero</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════════════ */
[data-theme="dark"]{
  --bg:#08090f; --bg2:#0d0f1a; --bg3s:#131626; --bg3:#131626;
  --bd:#1c1f33; --bd2:#272b48;
  --tx:#dde0f0; --tx2:#7880a8; --tx3:#3e4460;
  --am:#f59e0b; --am2:#fbbf24; --amd:#261800;
  --gn:#10b981; --gnd:#052015;
  --rd:#ef4444; --rdd:#200808;
  --bl:#3b82f6; --bld:#060e24;
  --pu:#8b5cf6; --pud:#0f0920;
  --cy:#06b6d4; --cyd:#021018;
  --sh:0 8px 32px rgba(0,0,0,.6);
  --sh2:0 2px 8px rgba(0,0,0,.4);
  --ctx:#131626;
  --gradient-hero: linear-gradient(135deg,#0d0f1a 0%,#111528 100%);
}
[data-theme="light"]{
  --bg:#f2f4f9; --bg2:#ffffff; --bg3s:#f7f8fc; --bg3:#f7f8fc;
  --bd:#e2e5f0; --bd2:#c8ccde;
  --tx:#161828; --tx2:#40497a; --tx3:#8890b8;
  --am:#d97706; --am2:#f59e0b; --amd:#fef3c7;
  --gn:#059669; --gnd:#d1fae5;
  --rd:#dc2626; --rdd:#fee2e2;
  --bl:#2563eb; --bld:#dbeafe;
  --pu:#7c3aed; --pud:#ede9fe;
  --cy:#0891b2; --cyd:#cffafe;
  --sh:0 4px 20px rgba(0,0,0,.08);
  --sh2:0 1px 4px rgba(0,0,0,.06);
  --ctx:#ffffff;
  --gradient-hero: linear-gradient(135deg,#ffffff 0%,#f7f8fc 100%);
}
:root{
  --r:8px; --r2:12px; --r3:16px;
  --fh:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --fm:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --fmono:'JetBrains Mono','Menlo',monospace;
  --sidebar-w:206px;
  --topbar-h:50px;
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--fm);font-size:13px;line-height:1.5;overflow:hidden;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{transition:background .2s,color .2s;letter-spacing:-.005em}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--tx3)}

/* ═══════════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════════ */
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--bg2);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;z-index:20;
  transition:transform .25s ease,width .25s ease,min-width .25s ease,background .2s,border-color .2s;
}
#sidebar.collapsed{width:0;min-width:0;transform:translateX(-100%)}
.slogo{
  padding:14px 14px 12px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.slogo-wrap{overflow:hidden}
.slogo-mark{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--am);letter-spacing:-.5px;white-space:nowrap}
.slogo-sub{font-size:9px;color:var(--tx3);letter-spacing:1.4px;text-transform:uppercase;margin-top:1px;white-space:nowrap;font-weight:500}
.slogo-ver{font-size:9px;color:var(--tx3);font-family:var(--fmono);margin-top:1px}
.snav{flex:1;padding:6px 6px;overflow-y:auto}
.snav-lbl{font-size:9px;color:var(--tx3);letter-spacing:1.6px;text-transform:uppercase;padding:8px 8px 3px;font-weight:600}
.ni{
  display:flex;align-items:center;gap:9px;padding:7px 9px;
  border-radius:var(--r);cursor:pointer;color:var(--tx2);font-size:12.5px;
  transition:all .13s;margin-bottom:1px;border:1px solid transparent;
  white-space:nowrap;overflow:hidden;font-weight:500;
}
.ni:hover{background:var(--bg3s);color:var(--tx)}
.ni.on{background:var(--amd);color:var(--am);border-color:rgba(245,158,11,.2)}
.ni .ic{font-size:13px;width:15px;text-align:center;flex-shrink:0}
.ni .bdg{margin-left:auto;background:var(--rd);color:#fff;font-size:9px;padding:1px 5px;border-radius:10px;flex-shrink:0;font-weight:600}
.sfooter{padding:9px 14px 12px;border-top:1px solid var(--bd)}
.savatar{width:24px;height:24px;background:var(--amd);border:1px solid var(--am);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--am);font-weight:700;flex-shrink:0}
#btn-logout{width:100%;padding:5px;background:transparent;border:1px solid var(--bd2);border-radius:var(--r);color:var(--tx3);cursor:pointer;font-family:var(--fm);font-size:11px;transition:all .13s;white-space:nowrap;font-weight:500}
#btn-logout:hover{border-color:var(--rd);color:var(--rd)}

/* Connection status indicator */
.conn-status{
  display:flex;align-items:center;gap:6px;padding:5px 9px;
  background:var(--bg3s);border:1px solid var(--bd);border-radius:6px;
  margin:6px 0 9px;font-size:10px;color:var(--tx3);
}
.conn-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;transition:background .2s}
.conn-dot.ok{background:var(--gn);box-shadow:0 0 6px rgba(16,185,129,.4)}
.conn-dot.bad{background:var(--rd)}
.conn-dot.sync{background:var(--am);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.conn-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}

/* OVERLAY for mobile */
#sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:15;display:none}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;border-bottom:1px solid var(--bd);background:var(--bg2);
  height:var(--topbar-h);min-height:var(--topbar-h);flex-shrink:0;
  transition:background .2s,border-color .2s;
  gap:12px;
}
.topbar-left{display:flex;align-items:center;gap:11px;min-width:0}
.menu-btn{
  background:none;border:none;cursor:pointer;color:var(--tx2);
  padding:5px;border-radius:var(--r);font-size:18px;line-height:1;
  display:flex;align-items:center;justify-content:center;
  transition:all .13s;flex-shrink:0;
}
.menu-btn:hover{background:var(--bg3s);color:var(--tx)}
.topbar-title{font-family:var(--fh);font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
.tbar-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:16px 18px;scroll-behavior:smooth}

/* ═══════════════════════════════════════════════════════════
   THEME TOGGLE
═══════════════════════════════════════════════════════════ */
.tbtn{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px;border-radius:var(--r);
  border:1px solid var(--bd2);background:transparent;
  color:var(--tx2);font-size:12px;cursor:pointer;font-family:var(--fm);
  transition:all .13s;
}
.tbtn:hover{border-color:var(--am);color:var(--am)}

/* ═══════════════════════════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════════════════════════ */
#auth-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:100;
}
.acard{
  background:var(--bg2);border:1px solid var(--bd2);
  border-radius:var(--r3);padding:36px;width:min(380px,90vw);
  box-shadow:var(--sh);
}
.alogo{font-family:var(--fh);font-size:24px;font-weight:700;color:var(--am);letter-spacing:-.02em}
.atag{color:var(--tx3);font-size:11px;margin-top:3px;margin-bottom:22px}
.atabs{display:flex;margin-bottom:16px;border-bottom:1px solid var(--bd)}
.atab{padding:7px 16px;cursor:pointer;color:var(--tx3);font-size:12px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .13s;font-weight:500}
.atab.on{color:var(--am);border-color:var(--am)}

/* ═══════════════════════════════════════════════════════════
   FORMS
═══════════════════════════════════════════════════════════ */
.fg{margin-bottom:11px}
.fg label{display:block;font-size:10px;color:var(--tx3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;font-weight:600}
.fg input,.fg select,.fg textarea{
  width:100%;background:var(--bg3s);border:1px solid var(--bd2);
  border-radius:var(--r);padding:7px 10px;color:var(--tx);
  font-family:var(--fm);font-size:12.5px;outline:none;
  transition:border-color .13s,box-shadow .13s;
}
.fg input[type="number"],.fg input[type="date"]{font-family:var(--fmono);font-variant-numeric:tabular-nums}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  border-color:var(--am);box-shadow:0 0 0 3px rgba(245,158,11,.12);
}
.fg textarea{resize:vertical;min-height:52px}
.fg select option{background:var(--bg3s)}
.frow{display:grid;gap:9px}
.frow.c2{grid-template-columns:1fr 1fr}
.frow.c3{grid-template-columns:1fr 1fr 1fr}
.frow.c4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:600px){.frow.c2,.frow.c3,.frow.c4{grid-template-columns:1fr}}

/* ═══════════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:var(--r);
  font-family:var(--fm);font-size:12.5px;font-weight:500;
  cursor:pointer;border:1px solid transparent;
  transition:all .13s;white-space:nowrap;letter-spacing:-.005em;
}
.bp{background:var(--am);color:#100800;border-color:var(--am);font-weight:600}
.bp:hover{background:var(--am2)}
.bs{background:transparent;color:var(--tx2);border-color:var(--bd2)}
.bs:hover{border-color:var(--am);color:var(--am)}
.bg{background:var(--gn);color:#021008;border-color:var(--gn);font-weight:600}
.bg:hover{opacity:.85}
.bd_{background:transparent;color:var(--rd);border-color:rgba(239,68,68,.3)}
.bd_:hover{background:var(--rdd)}
.bghost{background:transparent;color:var(--tx3);border-color:transparent;padding:4px 7px}
.bghost:hover{color:var(--tx)}
.btn-sm{padding:3px 9px;font-size:11px}
.btn-xs{padding:2px 7px;font-size:10px}
.btn:disabled{opacity:.35;cursor:not-allowed}
.bfull{width:100%;justify-content:center}

/* ═══════════════════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════════════════ */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:14px 16px;transition:background .2s,border-color .2s}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:11px;gap:8px}
.card-ti{font-family:var(--fh);font-size:13px;font-weight:600;letter-spacing:-.01em}
.card-su{font-size:11px;color:var(--tx3);margin-top:2px;font-weight:400}

/* ═══════════════════════════════════════════════════════════
   KPI CARDS
═══════════════════════════════════════════════════════════ */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:14px}
.kcard{
  background:var(--bg2);border:1px solid var(--bd);
  border-radius:var(--r2);padding:11px 14px;
  position:relative;overflow:hidden;
  transition:background .2s,border-color .2s,transform .15s;
}
.kcard:hover{transform:translateY(-1px);border-color:var(--bd2)}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r2) var(--r2) 0 0}
.k-am::before{background:var(--am)}.k-gn::before{background:var(--gn)}
.k-rd::before{background:var(--rd)}.k-bl::before{background:var(--bl)}
.k-pu::before{background:var(--pu)}.k-cy::before{background:var(--cy)}
.klbl{font-size:9px;color:var(--tx3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;font-weight:500}
.kval{font-family:var(--fmono);font-size:17px;font-weight:600;line-height:1.1;letter-spacing:-.3px}
.ksub{font-size:10px;color:var(--tx3);margin-top:3px}
.kico{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:22px;opacity:.06;pointer-events:none}
.ktrend{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 6px;border-radius:10px;margin-top:5px}
.ktrend.up{background:var(--gnd);color:var(--gn)}
.ktrend.dn{background:var(--rdd);color:var(--rd)}
.ktrend.neu{background:var(--bg3s);color:var(--tx3)}

/* ═══════════════════════════════════════════════════════════
   TABLES
═══════════════════════════════════════════════════════════ */
.tw{overflow-x:auto;border-radius:var(--r2);border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;min-width:420px;font-size:12.5px}
thead tr{background:var(--bg3s)}
th{
  text-align:left;padding:7px 11px;font-size:10px;
  color:var(--tx3);letter-spacing:.6px;text-transform:uppercase;
  font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap;
  user-select:none;
}
td{padding:7px 11px;font-size:12.5px;color:var(--tx2);border-bottom:1px solid var(--bd)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(128,128,255,.025);transition:background .1s}
.tdm{color:var(--tx);font-weight:500}
.tdn{text-align:right;font-family:var(--fmono);font-variant-numeric:tabular-nums;font-size:12.5px}
.tdc{text-align:center}

/* Row states */
.rp>td{opacity:.42}
.ro>td{background:var(--rdd)!important;color:var(--rd)!important}
.ro:hover>td{background:rgba(239,68,68,.14)!important}
.ro>.tdm{color:var(--rd)!important;font-weight:600}
.rpartial>td{background:rgba(245,158,11,.05)!important}

/* ═══════════════════════════════════════════════════════════
   CHIPS / BADGES
═══════════════════════════════════════════════════════════ */
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.cgn{background:var(--gnd);color:var(--gn);border:1px solid rgba(16,185,129,.2)}
.crd{background:var(--rdd);color:var(--rd);border:1px solid rgba(239,68,68,.2)}
.cam{background:var(--amd);color:var(--am);border:1px solid rgba(245,158,11,.2)}
.cbl{background:var(--bld);color:var(--bl);border:1px solid rgba(59,130,246,.2)}
.cpu{background:var(--pud);color:var(--pu);border:1px solid rgba(139,92,246,.2)}
.ccy{background:var(--cyd);color:var(--cy);border:1px solid rgba(6,182,212,.2)}
.pp-badge{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:10px;font-size:9px;background:var(--bg3s);border:1px solid var(--bd2);color:var(--tx2);margin:1px}
.pp-badge.paid{background:var(--gnd);border-color:rgba(16,185,129,.2);color:var(--gn)}
.pp-badge.due{background:var(--rdd);border-color:rgba(239,68,68,.2);color:var(--rd)}

/* ═══════════════════════════════════════════════════════════
   MODALS
═══════════════════════════════════════════════════════════ */
.mover{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  z-index:200;display:flex;align-items:center;justify-content:center;
  padding:16px;backdrop-filter:blur(4px);
}
.modal{
  background:var(--bg2);border:1px solid var(--bd2);
  border-radius:var(--r3);width:100%;max-width:600px;
  max-height:92vh;overflow-y:auto;box-shadow:var(--sh);
}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--bd)}
.mti{font-family:var(--fh);font-size:14px;font-weight:700}
.mcl{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--r);transition:all .13s}
.mcl:hover{background:var(--bg3s);color:var(--tx)}
.mbd{padding:16px 20px}
.mft{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--bd)}

/* ═══════════════════════════════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════════════════════════════ */
#ctx{
  position:fixed;z-index:500;background:var(--ctx);
  border:1px solid var(--bd2);border-radius:var(--r2);
  box-shadow:var(--sh);padding:5px;min-width:215px;
  display:none;animation:fadeIn .1s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.ci{display:flex;align-items:center;gap:9px;padding:7px 11px;border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--tx2);transition:all .11s;user-select:none}
.ci:hover{background:var(--bg3s);color:var(--tx)}
.ci.cig:hover{background:var(--gnd);color:var(--gn)}
.ci.cid:hover{background:var(--rdd);color:var(--rd)}
.cdiv{height:1px;background:var(--bd);margin:4px 0}
.clbl{font-size:9px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;padding:3px 11px 1px}

/* ═══════════════════════════════════════════════════════════
   FILTER BAR
═══════════════════════════════════════════════════════════ */
.fbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.fbar select,.fbar input{
  background:var(--bg2);border:1px solid var(--bd2);
  border-radius:var(--r);padding:6px 11px;
  color:var(--tx);font-family:var(--fm);font-size:12px;outline:none;
  transition:border-color .13s;
}
.fbar select:focus,.fbar input:focus{border-color:var(--am)}
.flbl{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;white-space:nowrap}

/* ═══════════════════════════════════════════════════════════
   PROGRESS
═══════════════════════════════════════════════════════════ */
.pbar{height:4px;background:var(--bg3s);border-radius:2px;overflow:hidden}
.pfill{height:100%;border-radius:2px;background:var(--am);transition:width .5s ease}
.pfill.gn{background:var(--gn)}.pfill.rd{background:var(--rd)}.pfill.bl{background:var(--bl)}

/* ═══════════════════════════════════════════════════════════
   ALERTS
═══════════════════════════════════════════════════════════ */
.alrt{display:flex;gap:8px;padding:10px 13px;border-radius:var(--r);margin-bottom:11px;font-size:12px}
.ae{background:var(--rdd);border:1px solid rgba(239,68,68,.25);color:var(--rd)}
.as_{background:var(--gnd);border:1px solid rgba(16,185,129,.25);color:var(--gn)}
.aw{background:var(--amd);border:1px solid rgba(245,158,11,.25);color:var(--am)}
.ai{background:var(--bld);border:1px solid rgba(59,130,246,.25);color:var(--bl)}

/* ═══════════════════════════════════════════════════════════
   DEBT CARDS
═══════════════════════════════════════════════════════════ */
.dcgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:12px}
.dc{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);
  padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.dc:hover{border-color:var(--bd2);transform:translateY(-2px);box-shadow:var(--sh)}
.dc-type{
  position:absolute;top:0;right:0;padding:3px 9px;
  font-size:9px;letter-spacing:1px;text-transform:uppercase;
  border-radius:0 var(--r2) 0 var(--r);
}
.dc-type.loan{background:rgba(59,130,246,.13);color:var(--bl)}
.dc-type.credit_card{background:rgba(139,92,246,.13);color:var(--pu)}
.dc-type.personal{background:rgba(16,185,129,.13);color:var(--gn)}
.dc-name{font-family:var(--fh);font-size:13px;font-weight:700;margin-bottom:2px;padding-right:70px}
.dc-desc{font-size:10px;color:var(--tx3);margin-bottom:10px}
.dc-total{font-family:var(--fmono);font-size:17px;font-weight:700;margin-bottom:1px;letter-spacing:-.3px}
.dc-meta{display:flex;gap:10px;margin-top:9px;padding-top:9px;border-top:1px solid var(--bd)}

function updateConnUI() {
  const dot  = document.getElementById('conn-dot');
  const text = document.getElementById('conn-text');
  if (!dot || !text) return;

  if (!_connState.online) {
    dot.className = 'conn-dot bad';
    text.innerHTML = '<strong>Sin conexión</strong>';
    text.style.color = 'var(--rd)';
    return;
  }
  if (_connState.syncing) {
    dot.className = 'conn-dot sync';
    text.innerHTML = 'Sincronizando…';
    text.style.color = 'var(--am)';
    return;
  }
  if (_connState.syncError) {
    dot.className = 'conn-dot bad';
    text.innerHTML = 'Error de sincronización';
    text.style.color = 'var(--rd)';
    return;
  }
  // OK
  dot.className = 'conn-dot ok';
  text.style.color = '';
  if (_connState.lastSync) {
    const secs = Math.floor((Date.now() - _connState.lastSync) / 1000);
    let ago;
    if (secs < 5)        ago = 'ahora';
    else if (secs < 60)  ago = `hace ${secs}s`;
    else if (secs < 3600)ago = `hace ${Math.floor(secs/60)}m`;
    else                 ago = `hace ${Math.floor(secs/3600)}h`;
    text.innerHTML = `Conectado · sync ${ago}`;
  } else {
    text.innerHTML = 'Conectado';
  }
}

/* ═══════════════════════════════════════════════════════════
   SORTING HELPERS
═══════════════════════════════════════════════════════════ */
function toggleSort(tableKey, col, rerender) {
  if (!S.sort[tableKey]) S.sort[tableKey] = { col, dir: 'asc' };
  else if (S.sort[tableKey].col === col) {
    S.sort[tableKey].dir = S.sort[tableKey].dir === 'asc' ? 'desc' : 'asc';
  } else {
    S.sort[tableKey] = { col, dir: 'asc' };
  }
  if (typeof rerender === 'function') rerender();
}

function sortRows(rows, sortState, customCompare) {
  if (!sortState || !sortState.col) return rows;
  const { col, dir } = sortState;
  const mult = dir === 'asc' ? 1 : -1;
  return [...rows].sort((a, b) => {
    if (customCompare) {
      const c = customCompare(a, b, col);
      if (c !== undefined) return c * mult;
    }
    const va = a[col], vb = b[col];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * mult;
    // Try numeric parse
    const na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb) && String(va) === String(na) && String(vb) === String(nb)) return (na - nb) * mult;
    return String(va).localeCompare(String(vb), 'es') * mult;
  });
}

function sortHeader(label, col, tableKey, rerenderFn, extraClass) {
  const st = S.sort[tableKey];
  const cls = (st && st.col === col) ? `sort-${st.dir}` : '';
  return `<th class="sortable ${cls} ${extraClass||''}" onclick="toggleSort('${tableKey}','${col}',${rerenderFn})">${label}</th>`;
}

/* ═══════════════════════════════════════════════════════════
   FINANCIAL LOGIC
═══════════════════════════════════════════════════════════ */
const Fin = {
  buildAmort(principal, annualRate, months, startDate) {
    const r = annualRate / 100 / 12;
    const cuota = r === 0 ? principal / months
      : principal * r * Math.pow(1 + r, months) / (Math.pow(1 + r, months) - 1);
    let bal = principal; const rows = [];
    let d = new Date(startDate + 'T12:00:00');
    for (let i = 1; i <= months; i++) {
      const int_ = bal * r;
      const cap  = Math.min(cuota - int_, bal);
      bal = Math.max(0, bal - cap);
      rows.push({ n: i, due: d.toISOString().split('T')[0], cap, int: int_, total: cuota, bal });
      d = new Date(d); d.setMonth(d.getMonth() + 1);
    }
    return rows;
  },

  annotated(debtId) {
    const today = new Date().toISOString().split('T')[0];
    return S.amorts.filter(a => a.debt_id === debtId)
      .sort((a, b) => a.n - b.n)
      .map(a => {
        // Solo considerar pagos APROBADOS para cálculos
        const allInstPays = S.instPayments.filter(p => p.amort_id === a.id);
        const instPays = allInstPays.filter(p => Fin.isApproved(p));
        const pendingPays = allInstPays.filter(p => Fin.isPending(p));

        if (a.paid_date) return { ...a, status: 'paid', instPays, pendingPays, allInstPays };

        const instTotal = instPays.reduce((s, p) => s + (parseFloat(p.amount) || 0), 0);
        const paidByInst = instTotal >= a.total * 0.99;
        const partial    = instTotal > 0 && !paidByInst;
        const partialRemaining = Math.max(0, a.total - instTotal); // ← cuánto FALTA en esta cuota
        const status = paidByInst ? 'paid' : partial ? 'partial' : a.due < today ? 'overdue' : 'pending';
        return { ...a, status, instTotal, partialRemaining, instPays, pendingPays, allInstPays };
      });
  },

  // ── APPROVAL helpers ──
  isApproved(p) { return !p.status || p.status === 'approved'; },
  isPending(p)  { return p.status === 'pending'; },
  isRejected(p) { return p.status === 'rejected'; },

  pendingPaymentsCount() {
    return S.payments.filter(Fin.isPending).length + S.instPayments.filter(Fin.isPending).length;
  },
  allPendingPayments() {
    const all = [
      ...S.payments.filter(Fin.isPending).map(p => ({ ...p, _kind: 'generic' })),
      ...S.instPayments.filter(Fin.isPending).map(p => ({ ...p, _kind: 'inst' })),
    ];
    return all.sort((a, b) => (b.payment_date || b.paid_date || '').localeCompare(a.payment_date || a.paid_date || ''));
  },

  paidGeneric(debtId)  { return S.payments.filter(p => p.debt_id === debtId && Fin.isApproved(p)).reduce((s, p) => s + (+p.amount || 0), 0); },
  paidInst(debtId)     { return S.instPayments.filter(p => p.debt_id === debtId && Fin.isApproved(p)).reduce((s, p) => s + (+p.amount || 0), 0); },
  totalPaid(debtId)    { return Fin.paidGeneric(debtId) + Fin.paidInst(debtId); },
  remaining(d)         { return Math.max(0, (+d.total_amount || 0) - Fin.totalPaid(d.id)); },
  overdueCount(debtId) { return Fin.annotated(debtId).filter(a => a.status === 'overdue' || a.status === 'partial').length; },

  /* ── TIPO DE DEUDA ──
     hasAmort = true → tabla de amortización (cuotas)
     hasAmort = false → pago libre con abonos
  */
  hasAmort(debt) {
    if (!debt) return true;
    if (debt.has_amort === false) return false;
    if (debt.has_amort === true)  return true;
    // Backward compat: si no tiene el campo, inferir por la existencia de amorts o por months
    const debtAmorts = S.amorts.filter(a => a.debt_id === debt.id);
    if (debtAmorts.length > 0) return true;
    return (+debt.months || 0) > 0;
  },

  // ── DIRECTION HELPERS ──
  isIncoming(debt)     { return debt?.direction === 'incoming'; },
  isOutgoing(debt)     { return !debt || debt.direction !== 'incoming'; }, // default = outgoing for backward compat
  outgoingDebts()      { return S.debts.filter(d => Fin.isOutgoing(d)); },
  incomingDebts()      { return S.debts.filter(d => Fin.isIncoming(d)); },

  // Total que YO debo (suma de saldos restantes outgoing)
  totalOwed() {
    return Fin.outgoingDebts().reduce((s, d) => s + Fin.remaining(d), 0);
  },
  // Total que ME DEBEN (suma de saldos restantes incoming)
  totalReceivable() {
    return Fin.incomingDebts().reduce((s, d) => s + Fin.remaining(d), 0);
  },
  // Cobros recibidos en el mes (de deudas incoming) — SOLO aprobados
  totalCollected(month) {
    const incomingIds = new Set(Fin.incomingDebts().map(d => d.id));
    const all = [...S.payments, ...S.instPayments].filter(p => incomingIds.has(p.debt_id) && Fin.isApproved(p));
    return all.filter(p => {
      const date = p.payment_date || p.paid_date;
      return !month || (date && date.startsWith(month));
    }).reduce((s, p) => s + (+p.amount || 0), 0);
  },

  partBalance(debtId, partId) {
    const part = S.parts.find(p => p.id === partId);
    const debt = S.debts.find(d => d.id === debtId);
    if (!part || !debt) return { owes: 0, paid: 0, due: 0 };
    const share = (parseFloat(part.pct) || 0) / 100;
    const owes  = (+debt.total_amount || 0) * share;
    const paid  = S.instPayments.filter(p => p.debt_id === debtId && p.part_id === partId && Fin.isApproved(p)).reduce((s, p) => s + (+p.amount || 0), 0)
                + S.payments.filter(p => p.debt_id === debtId && p.user_id === part.user_id && Fin.isApproved(p)).reduce((s, p) => s + (+p.amount || 0), 0);
    return { owes, paid, due: Math.max(0, owes - paid) };
  },

  /* ── INCOME ── */
  totalIncome(month) { // month = 'YYYY-MM' or null for all
    return S.incomes.filter(i => !month || i.month === month).reduce((s, i) => s + (+i.amount || 0), 0);
  },
  // GASTOS REALES = solo pagos APROBADOS a deudas OUTGOING (lo que yo pago)
  totalExpenses(month) {
    const outgoingIds = new Set(Fin.outgoingDebts().map(d => d.id));
    const paymentsThisMonth = [...S.payments, ...S.instPayments].filter(p => outgoingIds.has(p.debt_id) && Fin.isApproved(p) && (() => {
      const date = p.payment_date || p.paid_date;
      return !month || (date && date.startsWith(month));
    })());
    return paymentsThisMonth.reduce((s, p) => s + (+p.amount || 0), 0);
  },
  // FLUJO MENSUAL = ingresos manuales + cobros incoming - pagos outgoing
  monthlyFlow(month) {
    return Fin.totalIncome(month) + Fin.totalCollected(month) - Fin.totalExpenses(month);
  },
  // FLUJO LEGACY (solo ingresos manuales - pagos outgoing) para gráficos compatibles
  monthlyFlowLegacy(month) { return Fin.totalIncome(month) - Fin.totalExpenses(month); },

  /* ── DISTRIBUCIÓN DE PAGO EN CUOTAS ──
     Calcula CÓMO se distribuiría un monto en las cuotas pendientes,
     SIN aplicar nada (es un dry-run para mostrar el preview).
     Retorna: { allocations: [{amort_id, n, owed, allocated, willComplete}], extraAmount }
  */
  planPaymentDistribution(debtId, amount) {
    const annotated = Fin.annotated(debtId);
    // Cuotas pendientes ordenadas por número (más antiguas primero)
    const pending = annotated
      .filter(a => a.status !== 'paid')
      .sort((a, b) => a.n - b.n);

    let remaining = +amount || 0;
    const allocations = [];

    for (const a of pending) {
      if (remaining <= 0.005) break;
      // Cuánto falta pagar de esta cuota (considerando solo APROBADOS)
      const owed = Math.max(0, a.total - (a.instTotal || 0));
      if (owed <= 0.005) continue;

      const alloc = Math.min(remaining, owed);
      const willComplete = alloc >= owed - 0.005;
      allocations.push({
        amort_id: a.id,
        n: a.n,
        due: a.due,
        owed,
        allocated: alloc,
        willComplete,
        partialAfter: !willComplete,
      });
      remaining -= alloc;
    }

    return { allocations, extraAmount: Math.max(0, remaining) };
  },

  // Last 6 months
  last6Months() {
    const months = [];
    const d = new Date();
    for (let i = 5; i >= 0; i--) {
      const m = new Date(d.getFullYear(), d.getMonth() - i, 1);
      months.push(m.toISOString().slice(0, 7));
    }
    return months;
  },

  fmt(n, short) {
    if (isNaN(n) || n == null) return '$0.00';
    const v = Math.abs(parseFloat(n));
    const sign = n < 0 ? '-' : '';
    if (short && v >= 1000) return sign + '$' + (v / 1000).toFixed(1) + 'k';
    return sign + '$' + v.toLocaleString('es-EC', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  },
  fmtMonth(m) {
    const [y, mo] = m.split('-');
    const names = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return names[parseInt(mo) - 1] + ' ' + y.slice(2);
  },
  pct(a, b)       { return b ? Math.min(100, Math.max(0, a / b * 100)) : 0; },
  daysSince(s)    { return Math.floor((Date.now() - new Date(s + 'T12:00:00')) / 86400000); },
  currentMonth()  { return new Date().toISOString().slice(0, 7); },
};

const UI = {

  cm()      { document.getElementById('mc').innerHTML = ''; },
  chip(l, c_) { return `<span class="chip c${c_ || 'am'}">${l}</span>`; },
  typeChip(t) {
    const m = { loan: ['Préstamo', 'bl'], credit_card: ['Tarjeta', 'pu'], personal: ['Personal', 'gn'] };
    const [l, c_] = m[t] || [t, 'am']; return UI.chip(l, c_);
  },
  stChip(s) {
    const m = { paid: ['Pagada', 'gn'], partial: ['Parcial', 'am'], overdue: ['Atrasada', 'rd'], pending: ['Pendiente', 'am'] };
    const [l, c_] = m[s] || ['—', 'am']; return UI.chip(l, c_);
  },
  catChip(cat) {
    const m = { salary: ['Salario', 'bl'], extra: ['Extra', 'gn'], business: ['Negocio', 'pu'], other: ['Otro', ''] };
    const [l, cls] = m[cat] || ['Otro', ''];
    return `<span class="income-cat cat-${cat || 'other'}">${l}</span>`;
  },
  toast(msg, type = 'success') {
    const cols = { success: ['var(--gnd)', 'var(--gn)'], warn: ['var(--amd)', 'var(--am)'], error: ['var(--rdd)', 'var(--rd)'] };
    const [bg, fg] = cols[type] || cols.success;

  empty(icon, t, m, bl, bf) {
    return `<div style="text-align:center;padding:48px 20px;color:var(--tx3)">
      <div style="font-size:40px;margin-bottom:12px;opacity:.3">${icon}</div>
      <div style="font-family:var(--fh);font-size:15px;color:var(--tx2);margin-bottom:5px">${t}</div>
      <div style="font-size:12px">${m}</div>
      ${bl ? `<button class="btn bp" style="margin-top:14px" onclick="${bf}">${bl}</button>` : ''}
    </div>`;
  },
  kc(cls, lbl, val, sub, ico, trend) {
    return `<div class="kcard k-${cls}">
      <div class="klbl">${lbl}</div>
      <div class="kval">${val}</div>
      ${trend !== undefined ? trend : `<div class="ksub">${sub}</div>`}
      <div class="kico">${ico}</div>
    </div>`;
  },
  destroyCharts() { Object.keys(_charts).forEach(k => { _charts[k]?.destroy(); delete _charts[k]; }); },
  cc() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    return {
      tx: dark ? '#7880a8' : '#40497a',
      grid: dark ? 'rgba(255,255,255,.04)' : 'rgba(0,0,0,.05)',
      series: ['#f59e0b', '#3b82f6', '#10b981', '#ef4444', '#8b5cf6', '#06b6d4'],
    };
  },
  debtSelect(selectedId) {
    return `<option value="">-- Seleccionar deuda --</option>${S.debts.map(d => `<option value="${d.id}" ${d.id === selectedId ? 'selected' : ''}>${d.name}</option>`).join('')}`;
  },
};

const Ctx = {
  show(e, items) {
    e.preventDefault(); e.stopPropagation();
    const m = document.getElementById('ctx');
    m.innerHTML = items.map(it => {
      if (it === 'div') return `<div class="cdiv"></div>`;
      if (it.lbl_only) return `<div class="clbl">${it.lbl_only}</div>`;
      return `<div class="ci ${it.cls || ''}" onclick="Ctx.hide();(${it.fn})()">${it.ico || ''} ${it.lbl}</div>`;
    }).join('');
    m.style.display = 'block';
    const x = Math.min(e.clientX, window.innerWidth - m.offsetWidth - 8);
    const y = Math.min(e.clientY, window.innerHeight - m.offsetHeight - 8);
    m.style.left = x + 'px'; m.style.top = y + 'px';
  },
  hide() { document.getElementById('ctx').style.display = 'none'; },
};
document.addEventListener('click', Ctx.hide);
document.addEventListener('keydown', e => { if (e.key === 'Escape') { Ctx.hide(); UI.cm(); } });

/* ═══════════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════════ */
function authTab(tab) {
  document.querySelectorAll('.atab').forEach((t, i) =>
    t.classList.toggle('on', (i === 0 && tab === 'login') || (i === 1 && tab === 'register')));
  document.getElementById('auth-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('auth-reg').classList.toggle('hidden', tab !== 'register');
  ['ae', 'as_'].forEach(id => document.getElementById(id).classList.add('hidden'));
}
function authMsg(msg, type) {
  const el = document.getElementById(type === 'e' ? 'ae' : 'as_');
  el.textContent = msg; el.classList.remove('hidden');
}

async function doLogin() {
  const email = document.getElementById('le').value.trim();
  const pass  = document.getElementById('lp').value;
  if (!email || !pass) return authMsg('Ingresa email y contraseña', 'e');
  if (!sb) return authMsg('Supabase no está configurado', 'e');
  document.getElementById('bl').disabled = true;
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    user = data.user; await initApp();
  } catch (e) { authMsg(e.message || 'Error al iniciar sesión', 'e'); document.getElementById('bl').disabled = false; }
}
async function doRegister() {
  const name = document.getElementById('rn').value.trim();
  const email = document.getElementById('re').value.trim();
  const pass  = document.getElementById('rp').value;
  if (!name || !email || !pass) return authMsg('Completa todos los campos', 'e');
  if (pass.length < 6) return authMsg('Contraseña mínimo 6 caracteres', 'e');
  if (!sb) return authMsg('Supabase no está configurado', 'e');
  document.getElementById('br').disabled = true;
  try {
    const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
    if (error) throw error;
    authMsg('Cuenta creada. Revisa tu email para confirmar (o inicia sesión si la confirmación está desactivada).', 's');
  } catch (e) { authMsg(e.message || 'Error', 'e'); }
  document.getElementById('br').disabled = false;
}
async function doLogout() {
  if (sb) await sb.auth.signOut();
  user = null;
  if (_pollingInterval) { clearInterval(_pollingInterval); _pollingInterval = null; }
  S = { debts: [], amorts: [], instPayments: [], payments: [], parts: [], incomes: [], view: 'dashboard', selDebt: null };
  UI.destroyCharts();
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').classList.remove('hidden');
}

/* ═══════════════════════════════════════════════════════════
   DB LAYER
═══════════════════════════════════════════════════════════ */
const DB = {
  async loadAll() {
    if (!sb) return;
    setSyncStart();
    try {
      const uid = user.id;
      const [d, a, p, pp, ip, inc] = await Promise.all([
        sb.from('debts').select('*').eq('owner_user_id', uid),
        sb.from('amortizations').select('*'),
        sb.from('payments').select('*'),
        sb.from('participants').select('*'),
        sb.from('installment_payments').select('*'),
        sb.from('incomes').select('*').eq('user_id', uid),
      ]);
      // Si alguno tiene error, considerar como falla
      const err = [d,a,p,pp,ip,inc].find(r => r.error);
      if (err && err.error) throw err.error;
      S.debts = d.data || []; S.amorts = a.data || []; S.payments = p.data || [];
      S.parts = pp.data || []; S.instPayments = ip.data || []; S.incomes = inc.data || [];
      setSyncOk();
    } catch (e) {
      setSyncErr(e);
      throw e;
    }
  },

  async createDebt(data) {
    const d = { ...data, id: 'd-' + Date.now(), owner_user_id: user.id };
    S.debts.push(d);
    if (data.months && data.total_amount && data.start_date) {
      Fin.buildAmort(+data.total_amount, +data.interest_rate || 0, +data.months, data.start_date)
        .forEach((r, i) => S.amorts.push({ ...r, id: `${d.id}_${i}`, debt_id: d.id, paid_date: null }));
    }
    if (sb) await sb.from('debts').insert(d);
    return d;
  },

  async updateDebt(id, patch) {
    const idx = S.debts.findIndex(d => d.id === id);
    if (idx === -1) throw new Error('Deuda no encontrada');
    S.debts[idx] = { ...S.debts[idx], ...patch };
    if (sb) {
      const { error } = await sb.from('debts').update(patch).eq('id', id);
      if (error) throw error;
    }
    return S.debts[idx];
  },

  // Regenera la amortización conservando los paid_date de cuotas ya pagadas (por número de cuota)
  async regenerateAmort(debtId, principal, rate, months, startDate) {
    // Guardar paid_dates por número de cuota
    const oldPaid = {};
    S.amorts.filter(a => a.debt_id === debtId).forEach(a => { if (a.paid_date) oldPaid[a.n] = a.paid_date; });

    const newRows = Fin.buildAmort(+principal, +rate || 0, +months, startDate)
      .map((r, i) => ({ ...r, id: `${debtId}_${i}`, debt_id: debtId, paid_date: oldPaid[r.n] || null }));

    S.amorts = S.amorts.filter(a => a.debt_id !== debtId);
    newRows.forEach(r => S.amorts.push(r));

    if (sb) {
      await sb.from('amortizations').delete().eq('debt_id', debtId);
      if (newRows.length) await sb.from('amortizations').insert(newRows);
    }
  },

  async createInstPayment(data) {
    const p = { ...data, id: 'ip-' + Date.now() };
    S.instPayments.push(p);
    if (sb) await sb.from('installment_payments').insert(p);
    return p;
  },

  async createGenericPayment(data) {
    const p = { ...data, id: 'gp-' + Date.now() };
    S.payments.push(p);
    if (sb) await sb.from('payments').insert(p);
    return p;
  },

  /* Aplica distribución automática: crea instPayments por cada cuota cubierta y
     marca como pagadas las que se completaron. Si sobra, crea un payment genérico
     "abono extra".
     - amount: total a distribuir
     - meta: { date, notes, receipt_url, status, reported_by, part_id }
  */
  async applyDistributedPayment(debtId, amount, meta) {
    const plan = Fin.planPaymentDistribution(debtId, amount);
    const status      = meta.status      || 'approved';
    const reported_by = meta.reported_by || 'owner';
    const debt        = S.debts.find(d => d.id === debtId);
    const created = { instPayments: [], genericPayments: [], markedPaid: [] };

    // 1) Crear instPayments por cuota cubierta
    for (const a of plan.allocations) {
      const ip = {
        id: 'ip-' + Date.now() + '-' + Math.random().toString(36).slice(2,6),
        debt_id: debtId,
        amort_id: a.amort_id,
        part_id: meta.part_id || null,
        user_id: meta.user_id || (debt?.owner_user_id) || null,
        amount: a.allocated,
        paid_date: meta.date,
        notes: meta.notes ? `${meta.notes} (cuota #${a.n})` : `Distribuido — cuota #${a.n}`,
        receipt_url: meta.receipt_url || null,
        status, reported_by,
      };
      S.instPayments.push(ip);
      created.instPayments.push(ip);
      if (sb) await sb.from('installment_payments').insert(ip);

      // Solo marcar pagada si está aprobado Y completó la cuota
      if (a.willComplete && status === 'approved') {
        await DB.markAmortPaid(a.amort_id, meta.date);
        created.markedPaid.push(a.n);
      }
    }

    // 2) Si sobró dinero, registrar como pago genérico "extra"
    if (plan.extraAmount > 0.005) {
      const gp = {
        id: 'gp-' + Date.now() + '-' + Math.random().toString(36).slice(2,6),
        debt_id: debtId,
        user_id: meta.user_id || null,
        amount: plan.extraAmount,
        payment_date: meta.date,
        notes: meta.notes ? `${meta.notes} (excedente sin cuota)` : 'Excedente sin cuota',
        receipt_url: meta.receipt_url || null,
        status, reported_by,
      };
      S.payments.push(gp);
      created.genericPayments.push(gp);
      if (sb) await sb.from('payments').insert(gp);
    }

    return { plan, created };
  },

  async updatePayment(table, id, patch) {
    const arr = table === 'installment_payments' ? S.instPayments : S.payments;
    const idx = arr.findIndex(p => p.id === id);
    if (idx !== -1) arr[idx] = { ...arr[idx], ...patch };
    if (sb) await sb.from(table).update(patch).eq('id', id);
  },

  /* ─── Storage: comprobantes de pago ─── */
  async uploadReceipt(file, debtId) {
    if (!sb) throw new Error('Supabase no configurado');
    if (!file) return null;
    if (file.size > 5 * 1024 * 1024) throw new Error('La imagen es muy grande (máx. 5MB)');
    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
    if (!['jpg','jpeg','png','webp','heic','heif','gif','pdf'].includes(ext)) throw new Error('Formato no soportado');
    // Path: {user_id}/{debt_id}/{timestamp}-{rand}.{ext}
    const path = `${user.id}/${debtId}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
    const { error } = await sb.storage.from('payment-receipts').upload(path, file, {
      contentType: file.type || 'image/jpeg',
      upsert: false,
    });
    if (error) throw error;
    const { data: pub } = sb.storage.from('payment-receipts').getPublicUrl(path);
    return pub.publicUrl;
  },

  async deleteReceipt(url) {
    if (!sb || !url) return;
    // Extraer el path desde la URL pública
    const m = url.match(/payment-receipts\/(.+)$/);
    if (!m) return;
    await sb.storage.from('payment-receipts').remove([m[1]]);
  },

  async createIncome(data) {
    const inc = { ...data, id: 'inc-' + Date.now(), user_id: user.id };
    S.incomes.push(inc);
    if (sb) await sb.from('incomes').insert(inc);
    return inc;
  },

  async deleteIncome(id) {
    S.incomes = S.incomes.filter(i => i.id !== id);
    if (sb) await sb.from('incomes').delete().eq('id', id);
  },

  async deletePayment(id) {
    S.payments = S.payments.filter(p => p.id !== id);
    if (sb) await sb.from('payments').delete().eq('id', id);
  },

  async deleteInstPayment(id) {
    S.instPayments = S.instPayments.filter(p => p.id !== id);
    if (sb) await sb.from('installment_payments').delete().eq('id', id);
  },

  async updateIncome(id, patch) {
    const idx = S.incomes.findIndex(i => i.id === id);
    if (idx !== -1) S.incomes[idx] = { ...S.incomes[idx], ...patch };
    if (sb) await sb.from('incomes').update(patch).eq('id', id);
  },

  async markAmortPaid(amortId, paidDate) {
    const a = S.amorts.find(x => x.id === amortId);
    if (a) a.paid_date = paidDate;
    if (sb) await sb.from('amortizations').update({ paid_date: paidDate }).eq('id', amortId);
  },

  async saveParticipants(debtId, list) {
    S.parts = S.parts.filter(p => p.debt_id !== debtId);
    list.forEach(p => S.parts.push(p));
    if (sb) {
      await sb.from('participants').delete().eq('debt_id', debtId);
      if (list.length) await sb.from('participants').insert(list);
    }
  },

  async deleteDebt(id) {
    ['debts', 'amorts', 'payments', 'instPayments', 'parts'].forEach(k =>
      S[k] = S[k].filter(x => (x.id || x.debt_id) !== id && x.debt_id !== id));
    S.debts = S.debts.filter(d => d.id !== id);
    if (sb) await sb.from('debts').delete().eq('id', id);
  },

  async importAmortCSV(debtId, rows) {
    // Replace existing amorts for this debt
    S.amorts = S.amorts.filter(a => a.debt_id !== debtId);
    rows.forEach(r => S.amorts.push({ ...r, debt_id: debtId, paid_date: null }));
    if (sb) {
      await sb.from('amortizations').delete().eq('debt_id', debtId);
      await sb.from('amortizations').insert(rows.map(r => ({ ...r, debt_id: debtId, paid_date: null })));
    }
  },
};

async function initApp() {
  UI.load(true);
  try {
    await DB.loadAll();
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    const name = user.user_metadata?.full_name || user.email || 'Usuario';
    document.getElementById('uname').textContent = name.split(' ')[0];
    document.getElementById('uav').textContent = name[0].toUpperCase();
    document.getElementById('uemail').textContent = user.email || '';
    updateBadge(); go('dashboard');
    startPendingPoller();
  } catch (e) { console.error(e); UI.toast('Error al cargar datos', 'error'); }
  UI.load(false);
}

// Polling para sincronizar con Supabase y detectar cambios de otros dispositivos/usuarios
let _pollingInterval = null;
let _lastPendingCount = 0;
function startPendingPoller() {
  if (_pollingInterval) clearInterval(_pollingInterval);
  _lastPendingCount = Fin.pendingPaymentsCount();
  // Cada 30s: full sync para que cambios desde otra compu/usuario aparezcan
  _pollingInterval = setInterval(async () => {
    if (!sb || !user || !_connState.online) return;
    if (document.hidden) return; // no sincronizar cuando la pestaña está oculta
    try {
      await DB.loadAll();
      const newCount = Fin.pendingPaymentsCount();
      if (newCount > _lastPendingCount) {
        UI.toast(`🔔 Nuevo pago notificado por aprobar (${newCount} pendientes)`, 'warn');
      }
      _lastPendingCount = newCount;
      updateBadge();
      // Solo re-renderizar si el usuario está mirando una vista que muestra estos datos
      if (S.view === 'approvals' || S.view === 'payments' || S.view === 'dashboard') {
        go(S.view, S.selDebt);
      }
    } catch (e) { /* el setSyncErr ya se llamó */ }
  }, 30000);
}

// Sincronizar al volver a la pestaña (visibilitychange)
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && sb && user && _connState.online) {
    refreshFromDB(false).catch(() => {});
  }
});

function updateBadge() {
  const outOverdue = Fin.outgoingDebts().reduce((s, d) => s + Fin.overdueCount(d.id), 0);
  const b = document.getElementById('dbadge');
  b.textContent = outOverdue; b.classList.toggle('hidden', outOverdue === 0);

  const inCount = Fin.incomingDebts().filter(d => Fin.remaining(d) > 0).length;
  const rb = document.getElementById('rbadge');
  if (rb) { rb.textContent = inCount; rb.classList.toggle('hidden', inCount === 0); }

  // Pagos pendientes de aprobar
  const pendCount = Fin.pendingPaymentsCount();
  const ab = document.getElementById('abadge');
  if (ab) { ab.textContent = pendCount; ab.classList.toggle('hidden', pendCount === 0); }
}

function go(view, extra) {
  S.view = view; if (extra !== undefined) S.selDebt = extra;
  document.querySelectorAll('.ni').forEach(el => el.classList.toggle('on', el.dataset.v === view));
  const titles = { dashboard: 'Dashboard', income: 'Ingresos', debts: 'Mis Deudas', receivables: 'Cuentas por Cobrar', amort: 'Amortización', payments: 'Pagos', approvals: 'Aprobaciones', participants: 'Participantes', delinquency: 'Morosidad' };
  document.getElementById('ptitle').textContent = titles[view] || view;
  document.getElementById('tbactions').innerHTML = '';
  document.getElementById('content').innerHTML = '';
  UI.destroyCharts();
  if (window.innerWidth <= 768) closeSidebar();
  ({ dashboard: renderDashboard, income: renderIncome, debts: renderDebts, receivables: renderReceivables, amort: renderAmort, payments: renderPayments, approvals: renderApprovals, participants: renderParticipants, delinquency: renderDelinquency }[view] || (() => {}))(extra);
}

function filterIncomes() {
  const cat   = document.getElementById('flt-cat')?.value   || '';
  const month = document.getElementById('flt-inc-month')?.value || '';
  let rows = [...S.incomes];
  if (cat)   rows = rows.filter(i => i.category === cat);
  if (month) rows = rows.filter(i => i.month === month);

  // Sort
  rows = sortRows(rows, S.sort.incomes, (a, b, col) => {
    if (col === 'amount') return (parseFloat(a.amount)||0) - (parseFloat(b.amount)||0);
    return undefined;
  });

  // Headers (clickeable para ordenar)
  const thead = document.getElementById('inc-thead');
  if (thead) thead.innerHTML = `<tr>
    ${sortHeader('Fecha',       'date',        'incomes', 'filterIncomes')}
    ${sortHeader('Descripción', 'description', 'incomes', 'filterIncomes')}
    ${sortHeader('Categoría',   'category',    'incomes', 'filterIncomes')}
    ${sortHeader('Monto',       'amount',      'incomes', 'filterIncomes', 'tdn')}
    <th></th>
  </tr>`;

  const tbody = document.getElementById('inc-tbody');
  if (!tbody) return;
  tbody.innerHTML = rows.length ? rows.map(i => `<tr>
    <td>${i.date || '—'}</td>
    <td class="tdm">${i.description || '—'}</td>
    <td>${UI.catChip(i.category)}</td>
    <td class="tdn txt-gn fw7">${Fin.fmt(i.amount)}</td>
    <td style="white-space:nowrap">
      <button class="btn bghost btn-sm" onclick="modalIncomeForm('${i.id}')" title="Editar">✏️</button>
      <button class="btn bghost btn-sm" onclick="confirmDelIncome('${i.id}')" title="Eliminar">🗑</button>
    </td>
  </tr>`).join('') : `<tr><td colspan="5" style="text-align:center;color:var(--tx3);padding:26px">Sin ingresos en este filtro</td></tr>`;
}

function confirmDelIncome(id) {
  const inc = S.incomes.find(i => i.id === id);

  if (!confirm(`¿Eliminar el ingreso "${inc.description||inc.category}" de ${Fin.fmt(inc.amount)}?`)) return;

async function saveIncome() {
  const amt  = parseFloat(document.getElementById('i-amt').value);
  const date = document.getElementById('i-date').value;
  const cat  = document.getElementById('i-cat').value;
  const desc = document.getElementById('i-desc').value.trim();
  if (!amt || !date) { const e = document.getElementById('ierr'); e.textContent = 'Monto y fecha requeridos'; e.classList.remove('hidden'); return; }
  const month = date.slice(0, 7);
  document.getElementById('bsi').disabled = true;
  try {
    await DB.createIncome({ amount: amt, date, category: cat, description: desc || cat, month });
    UI.cm(); renderIncome(); UI.toast(`Ingreso de ${Fin.fmt(amt)} registrado 💰`);
  } catch (e) { const el = document.getElementById('ierr'); el.textContent = e.message || 'Error'; el.classList.remove('hidden'); document.getElementById('bsi').disabled = false; }
}

async function saveIncomeEdit(id) {
  const amt  = parseFloat(document.getElementById('i-amt').value);
  const date = document.getElementById('i-date').value;
  const cat  = document.getElementById('i-cat').value;
  const desc = document.getElementById('i-desc').value.trim();
  if (!amt || !date) { const e = document.getElementById('ierr'); e.textContent = 'Monto y fecha requeridos'; e.classList.remove('hidden'); return; }
  const month = date.slice(0, 7);
  document.getElementById('bsi').disabled = true;
  try {
    await DB.updateIncome(id, { amount: amt, date, category: cat, description: desc || cat, month });
    UI.cm(); renderIncome(); UI.toast(`✏️ Ingreso actualizado`);
  } catch (e) { const el = document.getElementById('ierr'); el.textContent = e.message || 'Error'; el.classList.remove('hidden'); document.getElementById('bsi').disabled = false; }
}

/* ── Public link helpers ── */
function publicLinkFor(debtId) {
  const d = S.debts.find(x => x.id === debtId);
  if (!d || !d.public_token) return null;
  // Build URL relative to current location (works on local file:// and on hosted)
  const base = location.href.split('?')[0].split('#')[0].replace(/\/[^\/]*$/, '/');
  return `${base}public.html?token=${encodeURIComponent(d.public_token)}`;
}

async function copyPublicLink(debtId) {
  const d = S.debts.find(x => x.id === debtId);
  if (!d) return;
  if (!d.public_token) {
    d.public_token = 'tok_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    if (sb) await sb.from('debts').update({ public_token: d.public_token }).eq('id', debtId);
  }
  const url = publicLinkFor(debtId);
  try {
    await navigator.clipboard.writeText(url);
    UI.toast('🔗 Link copiado al portapapeles');
  } catch {
    // Fallback: show modal with URL
    modalShareLink(debtId);
  }
}

function modalShareLink(debtId) {
  const d = S.debts.find(x => x.id === debtId);
  if (!d) return;
  if (!d.public_token) {
    d.public_token = 'tok_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    if (sb) sb.from('debts').update({ public_token: d.public_token }).eq('id', debtId);
  }
  const url = publicLinkFor(debtId);
  UI.modal(`<div class="mover"><div class="modal" style="max-width:520px">
    <div class="mhd"><div class="mti">🔗 Compartir link público — ${d.name}</div><button class="mcl" onclick="UI.cm()">✕</button></div>
    <div class="mbd">
      <div class="alrt ai">
        Comparte este link con <strong>${d.borrower_name || 'el deudor'}</strong> para que pueda ver el estado de la deuda en tiempo real.
        <br><span style="font-size:11px;color:var(--tx3)">Solo lectura · sin login · token único</span>
      </div>
      <div class="fg">
        <label>URL pública</label>
        <div style="display:flex;gap:6px">
          <input type="text" id="share-url" value="${url}" readonly onclick="this.select()" style="flex:1">
          <button class="btn bp btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('share-url').value).then(()=>UI.toast('Copiado'))">📋</button>
        </div>
      </div>
      <div class="fg">
        <label>Token (privado — no compartas excepto vía link)</label>
        <input type="text" value="${d.public_token}" readonly style="opacity:.6">
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
        <button class="btn bs btn-sm" onclick="window.open(document.getElementById('share-url').value,'_blank')">👁️ Vista previa</button>
        <button class="btn bd_ btn-sm" onclick="regenToken('${debtId}')">🔄 Regenerar token</button>
      </div>
      ${d.borrower_email ? `<div class="alrt as_" style="margin-top:10px">
        💡 Tip: envía este link a <strong>${d.borrower_email}</strong> por email o WhatsApp.
      </div>` : ''}
    </div>
    <div class="mft"><button class="btn bp" onclick="UI.cm()">Cerrar</button></div>
  </div></div>`);
}

async function regenToken(debtId) {
  const d = S.debts.find(x => x.id === debtId);
  if (!d) return;
  d.public_token = 'tok_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  if (sb) await sb.from('debts').update({ public_token: d.public_token }).eq('id', debtId);
  UI.toast('Token regenerado · el link anterior dejó de funcionar', 'warn');
  modalShareLink(debtId);
}

function renderAmort(debtId) {
  document.getElementById('tbactions').innerHTML = `
    <select onchange="go('amort',this.value)" style="background:var(--bg2);border:1px solid var(--bd2);color:var(--tx);padding:6px 11px;border-radius:var(--r);font-family:var(--fm);font-size:12px">

    ${debtId ? `

      <button class="btn bs btn-sm" onclick="modalEditDebt('${debtId}')" title="Editar deuda">✏️</button>
      ${(() => { const d = S.debts.find(x => x.id === debtId); return Fin.hasAmort(d) ? `<button class="btn bs btn-sm" onclick="modalImportCSV('${debtId}')">📂 CSV</button>` : ''; })()}` : ''}`;

  if (!debtId) { document.getElementById('content').innerHTML = UI.empty('📋', 'Selecciona una deuda', 'Elige del selector de arriba', '', ''); return; }

  if (!debt) { document.getElementById('content').innerHTML = '<div class="alrt ae">Deuda no encontrada</div>'; return; }

  // ─────────────────────────────────────────────────────────
  // VARIANTE: deuda SIN amortización (pago libre)
  // ─────────────────────────────────────────────────────────
  if (!Fin.hasAmort(debt)) {
    return renderAmortFreeForm(debtId, debt);
  }

  const rows  = Fin.annotated(debtId);
  const paid  = rows.filter(r => r.status === 'paid').length;
  const ov    = rows.filter(r => r.status === 'overdue' || r.status === 'partial').length;
  const pend  = rows.filter(r => r.status === 'pending').length;
  const rem   = Fin.remaining(debt);
  const parts = S.parts.filter(p => p.debt_id === debtId);
  const nextRow = rows.find(r => r.status !== 'paid');

  // CC section
  let ccSec = '';
  if (debt.type === 'credit_card') {
    const bal = parseFloat(debt.cc_balance) || 0;
    const gp  = Fin.paidGeneric(debtId);
    ccSec = `<div class="cc-card mb4">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div>
          <div style="font-size:9px;color:var(--pu);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px">💳 Tarjeta de Crédito — Saldo Rotativo</div>
          <div style="font-family:var(--fh);font-size:22px;font-weight:800">${Fin.fmt(bal)}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:3px">Saldo total registrado</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;color:var(--tx3)">Abonos realizados</div>
          <div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--gn)">${Fin.fmt(gp)}</div>
          <div style="font-size:10px;color:var(--tx3);margin-top:2px">Restante: <strong>${Fin.fmt(Math.max(0, bal - gp))}</strong></div>
        </div>
        <button class="btn bg btn-sm" onclick="modalGenericPay('${debtId}')">+ Abono saldo</button>
      </div>
      ${debt.cc_has_amort ? '<div style="margin-top:10px;font-size:11px;color:rgba(139,92,246,.7)">También tiene cuotas fijas — ver tabla abajo ↓</div>' : ''}
    </div>`;
  }

  // Participant summary
  let partSec = '';
  if (parts.length) {
    partSec = `<div class="card mb4">
      <div class="card-hd">
        <div><div class="card-ti">👥 Responsabilidad por Participante</div><div class="card-su">Cuánto debe y cuánto ha pagado cada uno</div></div>
        <button class="btn bs btn-sm" onclick="go('participants','${debtId}')">Editar →</button>
      </div>
      <div class="tw"><table>
        <thead><tr><th>Participante</th><th class="tdn">%</th><th class="tdn">Debe Total</th><th class="tdn">Pagado</th><th class="tdn">Le falta</th><th class="tdn">Próx. cuota</th><th>Estado</th></tr></thead>
        <tbody>${parts.map(pp => {
          const { owes, paid: ppaid, due } = Fin.partBalance(debtId, pp.id);
          const nc = nextRow ? nextRow.total * (pp.pct / 100) : 0;
          return `<tr>
            <td class="tdm">${pp.name}</td><td class="tdn">${pp.pct}%</td>
            <td class="tdn">${Fin.fmt(owes)}</td>
            <td class="tdn txt-gn">${Fin.fmt(ppaid)}</td>
            <td class="tdn ${due > 0 ? 'txt-rd' : ''} fw7">${Fin.fmt(due)}</td>
            <td class="tdn txt-am">${Fin.fmt(nc)}</td>
            <td>${due <= 0 ? UI.chip('Al día', 'gn') : UI.chip('Debe', 'rd')}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`;
  }

  document.getElementById('content').innerHTML = `
  <div class="kgrid" style="grid-template-columns:repeat(5,1fr);margin-bottom:16px">
    ${UI.kc('am','Deuda',`<span style="font-size:13px">${debt.name.length>15?debt.name.slice(0,13)+'…':debt.name}</span>`,UI.typeChip(debt.type),'')}
    ${UI.kc('gn','Pagadas',paid,'de '+rows.length,'')}
    ${UI.kc('rd','Atrasadas',ov,'cuotas','')}
    ${UI.kc('bl','Pendientes',pend,'','')}
    ${UI.kc('pu','Restante',Fin.fmt(rem,true),'capital','')}
  </div>
  ${ccSec}${partSec}
  <div class="card">
    <div class="card-hd">
      <div><div class="card-ti">Tabla de Amortización</div>

      <tbody>${rows.length ? rows.map(r => {

        const ppBadges = parts.length ? parts.map(pp => {

        // Mostrar info de pago parcial
        const partialInfo = r.status === 'partial'
          ? `<div style="font-size:10px;color:var(--am);margin-top:2px">

               · <span class="txt-rd">falta ${Fin.fmt(r.partialRemaining,true)}</span>
             </div>` : '';

        // Pagos pendientes de aprobación (notificados por deudor)
        const pendBadge = (r.pendingPays && r.pendingPays.length)
          ? `<div style="font-size:10px;color:var(--am);margin-top:2px;font-weight:600">⏳ ${r.pendingPays.length} pago${r.pendingPays.length>1?'s':''} por aprobar</div>` : '';

/* ── Render para deuda SIN amortización (pago libre) ── */
function renderAmortFreeForm(debtId, debt) {
  const total      = +debt.total_amount || 0;
  const paid       = Fin.totalPaid(debtId);
  const remaining  = Math.max(0, total - paid);
  const pct        = total ? Math.min(100, paid/total*100) : 0;
  const isCC       = debt.type === 'credit_card';
  const isIn       = Fin.isIncoming(debt);
  const allPays = [
    ...S.payments.filter(p => p.debt_id === debtId).map(p => ({ ...p, _kind:'generic', date: p.payment_date })),
    ...S.instPayments.filter(p => p.debt_id === debtId).map(p => ({ ...p, _kind:'inst',    date: p.paid_date    })),
  ].sort((a,b) => (b.date||'').localeCompare(a.date||''));

  document.getElementById('content').innerHTML = `
  <div class="kgrid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
    ${UI.kc('am','Deuda', `<span style="font-size:13px">${debt.name.length>15?debt.name.slice(0,13)+'…':debt.name}</span>`, UI.typeChip(debt.type), '')}
    ${UI.kc('bl','Total', Fin.fmt(total, true), 'monto original', '🏦')}
    ${UI.kc('gn','Pagado', Fin.fmt(paid, true), pct.toFixed(1)+'%', '✅')}

/* context menu — amort row */
function ctxAmortRow(e, debtId, amortId, status) {
  const amort = S.amorts.find(a => a.id === amortId);
  const parts = S.parts.filter(p => p.debt_id === debtId);
  const items = [{ lbl_only: `Cuota #${amort?.n} · ${Fin.fmt(amort?.total)}` }, 'div'];
  if (status !== 'paid') {
    items.push({ ico: '✅', lbl: 'Marcar PAGADA (hoy)', cls: 'cig', fn: `()=>markPaid('${amortId}','${debtId}',null)` });
    items.push({ ico: '📅', lbl: 'Marcar pagada con fecha…', fn: `()=>modalMarkPaid('${amortId}','${debtId}')` });
    if (parts.length) {
      items.push('div', { lbl_only: 'Pago por participante' });
      parts.forEach(pp => items.push({ ico: '💸', lbl: `${pp.name} (${pp.pct}% · ${Fin.fmt(amort?.total * (pp.pct / 100))})`, fn: `()=>modalInstPayment('${debtId}','${amortId}','${pp.id}')` }));
    } else {
      items.push('div', { ico: '💸', lbl: 'Registrar pago esta cuota', cls: 'cig', fn: `()=>modalInstPayment('${debtId}','${amortId}',null)` });
    }
  } else {
    items.push({ ico: '↩️', lbl: 'Desmarcar (volver a pendiente)', fn: `()=>markPaid('${amortId}','${debtId}','unmark')` });
    items.push('div', { ico: '🔍', lbl: 'Ver pagos de esta cuota', fn: `()=>showInstPayments('${amortId}')` });
  }
  items.push('div', { ico: '➕', lbl: 'Abono genérico a deuda', fn: `()=>modalGenericPay('${debtId}')` });
  Ctx.show(e, items);
}

async function markPaid(amortId, debtId, mode) {
  const date = mode === 'unmark' ? null : new Date().toISOString().split('T')[0];
  await DB.markAmortPaid(amortId, date);
  updateBadge(); go('amort', debtId);
  UI.toast(mode === 'unmark' ? 'Cuota desmarcada' : '✅ Cuota marcada como pagada', mode === 'unmark' ? 'warn' : 'success');
}

function modalMarkPaid(amortId, debtId) {

async function saveInstPayment(debtId, amortId, partId) {
  const amt   = parseFloat(document.getElementById('ip-amt').value);
  const date  = document.getElementById('ip-date').value;
  const notes = document.getElementById('ip-notes').value.trim();
  const file  = document.getElementById('ip-receipt')?.files[0];
  const mark  = document.getElementById('ip-markpaid').checked;
  const selP  = partId || document.getElementById('ip-part')?.value || '';
  if (!amt || !date) { const e = document.getElementById('ip-err'); e.textContent = 'Monto y fecha requeridos'; e.classList.remove('hidden'); return; }
  const pp = selP ? S.parts.find(p => p.id === selP) : null;
  try {
    let receiptUrl = null;
    if (file) {
      UI.toast('📤 Subiendo comprobante...', 'success');
      receiptUrl = await DB.uploadReceipt(file, debtId);
    }
    await DB.createInstPayment({ debt_id: debtId, amort_id: amortId, part_id: selP || null, user_id: pp?.user_id || user.id, amount: amt, paid_date: date, notes, receipt_url: receiptUrl });
    if (mark) await DB.markAmortPaid(amortId, date);
    UI.cm(); updateBadge(); go('amort', debtId);
    UI.toast(`✅ ${Fin.fmt(amt)} registrado${pp ? ' para ' + pp.name : ''}${receiptUrl?' · 📎':''}`);
  } catch (e) {
    const el = document.getElementById('ip-err'); el.textContent = e.message || 'Error al guardar';
    el.classList.remove('hidden');
  }
}

// Preview en vivo de la distribución mientras escribes el monto
function updateGpPreview(debtId) {
  const amt = parseFloat(document.getElementById('gp-amt')?.value) || 0;
  const distChk = document.getElementById('gp-distribute');
  const preview = document.getElementById('gp-preview');
  const info    = document.getElementById('gp-info');
  const debt    = S.debts.find(d => d.id === debtId);
  const rem     = Fin.remaining(debt);

  if (info) info.textContent = amt > 0 ? `Saldo después: ${Fin.fmt(Math.max(0, rem - amt))}` : '';

  if (!preview || !distChk) return;
  if (!distChk.checked || amt <= 0) { preview.innerHTML = ''; return; }

  const plan = Fin.planPaymentDistribution(debtId, amt);
  if (!plan.allocations.length && plan.extraAmount <= 0) { preview.innerHTML = ''; return; }

  const rows = plan.allocations.map(a => {
    const stChip = a.willComplete
      ? '<span class="chip cgn">✓ Completa</span>'
      : '<span class="chip cam">⊘ Parcial</span>';
    return `<tr>
      <td>Cuota #${a.n} <span style="color:var(--tx3);font-size:10px">(${a.due})</span></td>
      <td class="tdn" style="font-size:11px;color:var(--tx3)">${Fin.fmt(a.owed)}</td>
      <td class="tdn fw7 txt-gn">${Fin.fmt(a.allocated)}</td>
      <td>${stChip}</td>
    </tr>`;
  }).join('');

  const extraRow = plan.extraAmount > 0.005
    ? `<tr style="background:rgba(245,158,11,.08)">
        <td colspan="2" style="font-style:italic;color:var(--am)">💰 Excedente (sin cuota específica)</td>
        <td class="tdn fw7 txt-am">${Fin.fmt(plan.extraAmount)}</td>
        <td><span class="chip cam">Extra</span></td>
      </tr>` : '';

  preview.innerHTML = `<div style="background:var(--bg3s);border:1px solid var(--bd);border-radius:6px;padding:8px 10px">
    <div style="font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;font-weight:600">📊 Distribución prevista</div>
    <table style="width:100%;font-size:11px;min-width:auto">
      <thead><tr><th style="padding:4px 6px;font-size:9px">Cuota</th><th style="padding:4px 6px;font-size:9px" class="tdn">Falta</th><th style="padding:4px 6px;font-size:9px" class="tdn">Aplicado</th><th style="padding:4px 6px;font-size:9px">Estado</th></tr></thead>
      <tbody>${rows}${extraRow}</tbody>
    </table>
  </div>`;
}

async function saveGenericPay(debtId) {
  const amt   = parseFloat(document.getElementById('gp-amt').value);
  const date  = document.getElementById('gp-date').value;
  const notes = document.getElementById('gp-notes').value.trim();
  const file  = document.getElementById('gp-receipt')?.files[0];
  const distribute = document.getElementById('gp-distribute')?.checked;
  if (!amt || !date) { const e = document.getElementById('gp-err'); e.textContent = 'Monto y fecha requeridos'; e.classList.remove('hidden'); return; }
  document.getElementById('bgp').disabled = true;
  try {
    let receiptUrl = null;
    if (file) {
      UI.toast('📤 Subiendo comprobante...', 'success');
      receiptUrl = await DB.uploadReceipt(file, debtId);
    }
    const debt = S.debts.find(d => d.id === debtId);
    const isIn = Fin.isIncoming(debt);

    if (distribute) {
      // Modo distribución: aplica en cuotas y/o crea excedente
      const { plan, created } = await DB.applyDistributedPayment(debtId, amt, {
        date, notes, receipt_url: receiptUrl,
        user_id: user.id,
        status: 'approved', reported_by: 'owner',
      });
      UI.cm(); updateBadge(); go(S.view, S.selDebt);
      const completed = created.markedPaid.length;
      const partial   = plan.allocations.filter(a => !a.willComplete).length;
      const extra     = plan.extraAmount > 0.005;
      let msg = `${isIn?'📥 Cobro de':'Abono de'} ${Fin.fmt(amt)} aplicado`;
      const parts = [];
      if (completed) parts.push(`${completed} cuota${completed>1?'s':''} pagada${completed>1?'s':''}`);
      if (partial)   parts.push(`${partial} parcial`);
      if (extra)     parts.push(`${Fin.fmt(plan.extraAmount,true)} excedente`);
      if (parts.length) msg += ` · ${parts.join(', ')}`;
      UI.toast(msg);
    } else {
      // Modo clásico: solo registra pago genérico
      await DB.createGenericPayment({ debt_id: debtId, user_id: user.id, amount: amt, payment_date: date, notes, receipt_url: receiptUrl });
      UI.cm(); go(S.view, S.selDebt);
      UI.toast(`${isIn?'📥 Cobro de':'Abono de'} ${Fin.fmt(amt)} registrado${receiptUrl?' · 📎':''}`);
    }
  } catch (e) { const el = document.getElementById('gp-err'); el.textContent = e.message || 'Error'; el.classList.remove('hidden'); document.getElementById('bgp').disabled = false; }
}

// Buscar pago por ID en cualquiera de las dos tablas
function findPayment(id) {
  const inst = S.instPayments.find(p => p.id === id);
  if (inst) return { ...inst, _table: 'installment_payments', _kind: 'inst' };
  const gen = S.payments.find(p => p.id === id);
  if (gen) return { ...gen, _table: 'payments', _kind: 'generic' };
  return null;
}

  const p = findPayment(paymentId);
  if (!p) return UI.toast('Pago no encontrado', 'error');
  const debt = S.debts.find(d => d.id === p.debt_id);
  const isInst = p._kind === 'inst';
  const dateField = isInst ? 'paid_date' : 'payment_date';
  const date = p[dateField] || '';
  const isPending = Fin.isPending(p);
  const isRejected = Fin.isRejected(p);
  const reportedByBorrower = p.reported_by === 'borrower';

  UI.modal(`<div class="mover"><div class="modal" style="max-width:520px">
    <div class="mhd">
      <div class="mti">${isPending ? '⏳ Revisar pago notificado' : '✏️ Editar pago'}</div>
      <button class="mcl" onclick="UI.cm()">✕</button>
    </div>

async function saveEditedPayment(paymentId) {
  const p = findPayment(paymentId);
  if (!p) return UI.toast('Pago no encontrado', 'error');
  const amt   = parseFloat(document.getElementById('ep-amt').value);
  const date  = document.getElementById('ep-date').value;
  const notes = document.getElementById('ep-notes').value.trim();
  const file  = document.getElementById('ep-receipt')?.files[0];
  if (!amt || !date) { const el = document.getElementById('ep-err'); el.textContent = 'Monto y fecha requeridos'; el.classList.remove('hidden'); return; }

  const dateField = p._kind === 'inst' ? 'paid_date' : 'payment_date';
  const patch = { amount: amt, [dateField]: date, notes };

  document.getElementById('bep').disabled = true;
  try {
    if (file) {
      UI.toast('📤 Subiendo comprobante...', 'success');
      // Borrar el viejo si existía
      if (p.receipt_url) await DB.deleteReceipt(p.receipt_url).catch(()=>{});
      patch.receipt_url = await DB.uploadReceipt(file, p.debt_id);
    }
    await DB.updatePayment(p._table, paymentId, patch);
    UI.cm(); updateBadge(); go(S.view, S.selDebt);
    UI.toast('✏️ Pago actualizado');
  } catch (e) {
    const el = document.getElementById('ep-err');
    el.textContent = e.message || 'Error'; el.classList.remove('hidden');
    document.getElementById('bep').disabled = false;
  }
}

async function approvePayment(paymentId) {
  const p = findPayment(paymentId);
  if (!p) return;
  const note     = document.getElementById('ep-rnote')?.value.trim() || null;
  const amtEl    = document.getElementById('ep-amt');
  const dateEl   = document.getElementById('ep-date');
  const notesEl  = document.getElementById('ep-notes');
  const distChk  = document.getElementById('ep-distribute');
  const distribute = distChk && distChk.checked && p._kind === 'generic';

  // Valores finales (puede haber sido editado en el modal)
  const finalAmt   = amtEl   ? parseFloat(amtEl.value) : +p.amount;
  const dateField  = p._kind === 'inst' ? 'paid_date' : 'payment_date';
  const finalDate  = dateEl  ? dateEl.value : p[dateField];
  const finalNotes = notesEl ? notesEl.value.trim() : (p.notes || '');

  if (distribute) {
    // 1) Borrar el pago pendiente original (era genérico)
    await DB.deletePayment(paymentId);
    // 2) Aplicar distribución con los datos finales
    const { plan, created } = await DB.applyDistributedPayment(p.debt_id, finalAmt, {
      date: finalDate, notes: finalNotes || 'Pago aprobado del deudor',
      receipt_url: p.receipt_url || null,
      user_id: null,
      status: 'approved', reported_by: 'borrower',
    });
    // Notas de revisión: las guardamos en cada pago creado
    if (note) {
      for (const ip of created.instPayments) await DB.updatePayment('installment_payments', ip.id, { reviewer_note: note, reviewed_at: new Date().toISOString() });
      for (const gp of created.genericPayments) await DB.updatePayment('payments', gp.id, { reviewer_note: note, reviewed_at: new Date().toISOString() });
    }
    UI.cm(); updateBadge(); go(S.view, S.selDebt);
    const completed = created.markedPaid.length;
    let msg = `✅ Pago aprobado y distribuido`;
    const parts = [];
    if (completed) parts.push(`${completed} cuota${completed>1?'s':''} pagada${completed>1?'s':''}`);
    if (plan.allocations.some(a => !a.willComplete)) parts.push('1 parcial');
    if (plan.extraAmount > 0.005) parts.push(`${Fin.fmt(plan.extraAmount,true)} excedente`);
    if (parts.length) msg += ` · ${parts.join(', ')}`;
    UI.toast(msg);
  } else {
    // Comportamiento antiguo: solo cambiar status
    const patch = {
      status: 'approved',
      reviewed_at: new Date().toISOString(),
      reviewer_note: note,
    };
    if (amtEl && finalAmt !== +p.amount) patch.amount = finalAmt;
    if (dateEl && finalDate !== p[dateField]) patch[dateField] = finalDate;
    if (notesEl && finalNotes !== (p.notes||'')) patch.notes = finalNotes;

    await DB.updatePayment(p._table, paymentId, patch);
    UI.cm(); updateBadge(); go(S.view, S.selDebt);
    UI.toast(`✅ Pago de ${Fin.fmt(finalAmt)} aprobado`);
  }
}

async function rejectPayment(paymentId) {
  const p = findPayment(paymentId);
  if (!p) return;
  const note = document.getElementById('ep-rnote')?.value.trim() || null;
  if (!note) {
    if (!confirm('¿Rechazar este pago sin dar un motivo?\nEs mejor poner un motivo para que el deudor sepa qué pasó.')) return;
  }
  await DB.updatePayment(p._table, paymentId, {
    status: 'rejected',
    reviewed_at: new Date().toISOString(),
    reviewer_note: note,
  });
  UI.cm(); updateBadge(); go(S.view, S.selDebt);
  UI.toast('Pago rechazado', 'warn');
}

function confirmDeletePayment(paymentId) {
  const p = findPayment(paymentId);
  if (!p) return;
  if (!confirm(`¿Eliminar este pago de ${Fin.fmt(p.amount)}?\nEsta acción no se puede deshacer.`)) return;
  doDeletePayment(paymentId);
}

async function doDeletePayment(paymentId) {
  const p = findPayment(paymentId);
  if (!p) return;
  // Borrar receipt del storage si existe
  if (p.receipt_url) await DB.deleteReceipt(p.receipt_url).catch(()=>{});
  if (p._kind === 'inst') await DB.deleteInstPayment(paymentId);
  else                    await DB.deletePayment(paymentId);
  UI.cm(); updateBadge(); go(S.view, S.selDebt);
  UI.toast('Pago eliminado', 'warn');
}
