window._csvRows = [];
function handleCSVFile(e, debtId) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const text = ev.target.result;
      const rows = parseCSV(text);
      window._csvRows = rows;
      showCSVPreview(rows, debtId);
    } catch (err) {
      const el = document.getElementById('csv-err');
      el.textContent = 'Error al leer el CSV: ' + err.message; el.classList.remove('hidden');
    }
  };
  reader.readAsText(file);
}

function parseCSV(text) {
  const sep  = text.includes(';') ? ';' : ',';
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  const rows  = [];
  const startIdx = /[a-zA-Z]/i.test(lines[0]) ? 1 : 0; // skip header
  for (let i = startIdx; i < lines.length; i++) {
    const cols = lines[i].split(sep).map(c => c.trim().replace(/["']/g, ''));
    if (cols.length < 4) continue;
    // Try to auto-detect columns: cuota, vencimiento, capital, interes, total, saldo
    const n   = parseInt(cols[0])   || i - startIdx + 1;
    const due = parseDate(cols[1])  || '';
    const cap = parseNum(cols[2]);
    const int_ = parseNum(cols[3]);
    const total = cols[4] !== undefined ? parseNum(cols[4]) : cap + int_;
    const bal   = cols[5] !== undefined ? parseNum(cols[5]) : 0;
    rows.push({ id: `csv_${Date.now()}_${i}`, n, due, cap, int: int_, total, bal, paid_date: null });
  }
  if (!rows.length) throw new Error('No se encontraron filas válidas');
  return rows;
}

function parseDate(s) {
  if (!s) return '';
  // Try YYYY-MM-DD, DD/MM/YYYY, DD-MM-YYYY
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  const m1 = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m1) { const y = m1[3].length === 2 ? '20' + m1[3] : m1[3]; return `${y}-${m1[2].padStart(2,'0')}-${m1[1].padStart(2,'0')}`; }
  return '';
}
function parseNum(s) { if (!s) return 0; return parseFloat(s.replace(/[^\d.,\-]/g, '').replace(',', '.')) || 0; }

function showCSVPreview(rows, debtId) {
  const el = document.getElementById('csv-preview');
  const btn = document.getElementById('btn-csv-import');
  if (!el) return;
  btn?.classList.remove('hidden');
  el.innerHTML = `
  <div style="font-size:11px;color:var(--tx3);margin-bottom:8px">✅ ${rows.length} cuotas detectadas — vista previa (primeras 5):</div>
  <div class="tw"><table style="min-width:auto">
    <thead><tr><th>#</th><th>Vencimiento</th><th class="tdn">Capital</th><th class="tdn">Interés</th><th class="tdn">Total</th><th class="tdn">Saldo</th></tr></thead>
    <tbody>${rows.slice(0, 5).map(r => `<tr>
      <td>${r.n}</td><td>${r.due||'—'}</td>
      <td class="tdn">${Fin.fmt(r.cap)}</td><td class="tdn">${Fin.fmt(r.int)}</td>
      <td class="tdn fw7">${Fin.fmt(r.total)}</td><td class="tdn">${Fin.fmt(r.bal)}</td>
    </tr>`).join('')}
    ${rows.length > 5 ? `<tr><td colspan="6" style="text-align:center;color:var(--tx3);font-size:11px;padding:8px">... y ${rows.length - 5} más</td></tr>` : ''}
    </tbody></table></div>`;
}

function filterPays() {
  const dId  = document.getElementById('flt-debt')?.value   || '';
  const tType= document.getElementById('flt-type')?.value   || '';
  const month= document.getElementById('flt-month')?.value  || '';

  const baseFilter = (arr, dateField) => {
    let r = [...arr];
    if (dId)   r = r.filter(p => p.debt_id === dId);
    if (tType) r = r.filter(p => S.debts.find(x => x.id === p.debt_id)?.type === tType);
    if (month) r = r.filter(p => (p[dateField] || '').startsWith(month));
    return r;
  };

  // Custom comparator: para columnas derivadas (deuda nombre, cuota, etc.)
  const cmpInst = (a, b, col) => {
    if (col === 'debt')  return (S.debts.find(d=>d.id===a.debt_id)?.name||'').localeCompare(S.debts.find(d=>d.id===b.debt_id)?.name||'', 'es');
    if (col === 'cuota') return (S.amorts.find(x=>x.id===a.amort_id)?.n||0) - (S.amorts.find(x=>x.id===b.amort_id)?.n||0);
    if (col === 'part')  return (S.parts.find(x=>x.id===a.part_id)?.name||'').localeCompare(S.parts.find(x=>x.id===b.part_id)?.name||'', 'es');
    if (col === 'amount') return (parseFloat(a.amount)||0) - (parseFloat(b.amount)||0);
    if (col === 'status') {
      const ord = p => Fin.isPending(p)?0 : Fin.isRejected(p)?2 : 1;
      return ord(a) - ord(b);
    }
    return undefined;
  };
  const cmpGen = (a, b, col) => {
    if (col === 'debt')  return (S.debts.find(d=>d.id===a.debt_id)?.name||'').localeCompare(S.debts.find(d=>d.id===b.debt_id)?.name||'', 'es');
    if (col === 'type')  return (S.debts.find(d=>d.id===a.debt_id)?.type||'').localeCompare(S.debts.find(d=>d.id===b.debt_id)?.type||'', 'es');
    if (col === 'amount') return (parseFloat(a.amount)||0) - (parseFloat(b.amount)||0);
    if (col === 'status') {
      const ord = p => Fin.isPending(p)?0 : Fin.isRejected(p)?2 : 1;
      return ord(a) - ord(b);
    }
    return undefined;
  };

  const fi = sortRows(baseFilter(S.instPayments, 'paid_date'),    S.sort.payInst, cmpInst);
  const fg = sortRows(baseFilter(S.payments,     'payment_date'), S.sort.payGen,  cmpGen);
  const ti = fi.reduce((s, p) => s + (+p.amount || 0), 0);
  const tg = fg.reduce((s, p) => s + (+p.amount || 0), 0);

  // Headers
  const ith = document.getElementById('inst-thead');
  if (ith) ith.innerHTML = `<tr>
    ${sortHeader('Deuda',        'debt',      'payInst', 'filterPays')}
    ${sortHeader('Cuota #',      'cuota',     'payInst', 'filterPays')}
    ${sortHeader('Participante', 'part',      'payInst', 'filterPays')}
    ${sortHeader('Fecha',        'paid_date', 'payInst', 'filterPays')}
    <th>Notas</th>
    <th class="tdc">📎</th>
    ${sortHeader('Estado',       'status',    'payInst', 'filterPays')}
    ${sortHeader('Monto',        'amount',    'payInst', 'filterPays', 'tdn')}
    <th></th>
  </tr>`;
  const gth = document.getElementById('gen-thead');
  if (gth) gth.innerHTML = `<tr>
    ${sortHeader('Deuda',        'debt',          'payGen', 'filterPays')}
    ${sortHeader('Tipo',         'type',          'payGen', 'filterPays')}
    ${sortHeader('Fecha',        'payment_date',  'payGen', 'filterPays')}
    <th>Notas</th>
    <th class="tdc">📎</th>
    ${sortHeader('Estado',       'status',        'payGen', 'filterPays')}
    ${sortHeader('Monto',        'amount',        'payGen', 'filterPays', 'tdn')}
    <th></th>
  </tr>`;

  const kpis = document.getElementById('pays-kpis');
  if (kpis) kpis.innerHTML = `${UI.kc('gn','Por cuota',Fin.fmt(ti,true),fi.length+' pagos','')}${UI.kc('bl','Abonos',Fin.fmt(tg,true),fg.length+' abonos','')}${UI.kc('am','Total',Fin.fmt(ti+tg,true),'suma filtrada','')}`;

  const receiptCell = url => url
    ? `<button class="btn bghost btn-xs" onclick="viewReceipt('${url.replace(/'/g,"\\'")}')" title="Ver comprobante">📎</button>`
    : '<span class="txt-mu" style="font-size:10px">—</span>';

  const statusCell = p => {
    if (Fin.isPending(p))  return '<span class="chip cam" title="Pendiente de aprobación">⏳ Pendiente</span>';
    if (Fin.isRejected(p)) return '<span class="chip crd" title="Rechazado">✕ Rechazado</span>';
    return p.reported_by === 'borrower'
      ? '<span class="chip cgn" title="Aprobado · reportado por deudor">✓ Aprobado</span>'
      : '<span class="chip cgn">✓ OK</span>';
  };

  const it = document.getElementById('inst-tbody');
  if (it) it.innerHTML = fi.length ? fi.map(p => {
    const debt = S.debts.find(d => d.id === p.debt_id);
    const amort = S.amorts.find(a => a.id === p.amort_id);
    const pp = S.parts.find(x => x.id === p.part_id);
    return `<tr style="${Fin.isPending(p)?'background:rgba(245,158,11,.04)':''}">
      <td class="tdm">${debt?.name||'—'}</td>
      <td class="tdc">#${amort?.n||'—'}</td>

function renderEP(debtId) {
  const ed = document.getElementById('pe');
  if (!ed) return;
  ed.innerHTML = (window._ep || []).map((p, i) => `
  <div style="display:flex;gap:7px;align-items:center;padding:8px;background:var(--bg3s);border-radius:var(--r);margin-bottom:6px;border:1px solid var(--bd)">
    <input type="text"   value="${p.name||''}"  placeholder="Nombre" style="flex:1;background:var(--bg2);border:1px solid var(--bd2);border-radius:6px;padding:6px 9px;color:var(--tx);font-family:var(--fm);font-size:12px;outline:none" oninput="window._ep[${i}].name=this.value">
    <input type="email"  value="${p.email||''}" placeholder="Email (opcional)" style="width:170px;background:var(--bg2);border:1px solid var(--bd2);border-radius:6px;padding:6px 9px;color:var(--tx);font-family:var(--fm);font-size:12px;outline:none" oninput="window._ep[${i}].email=this.value">
    <input type="number" value="${p.pct||''}"   placeholder="%" min="0" max="100" step="0.5" style="width:60px;background:var(--bg2);border:1px solid var(--bd2);border-radius:6px;padding:6px 8px;color:var(--tx);font-family:var(--fm);font-size:12px;outline:none;text-align:right" oninput="window._ep[${i}].pct=parseFloat(this.value)||0;updatePctTot()">
    <button class="btn bd_ btn-sm" onclick="removeEP(${i},'${debtId}')">✕</button>
  </div>`).join('') || `<div style="color:var(--tx3);font-size:12px;padding:8px">Sin participantes. Agrega uno.</div>`;
  updatePctTot();
}

function addEP(debtId) {
  if (!window._ep) window._ep = [];
  window._ep.push({ id: 'np-' + Date.now(), debt_id: debtId, user_id: 'u-' + Date.now(), name: '', email: '', pct: 0 });
  renderEP(debtId);
}
function removeEP(i, debtId) { window._ep.splice(i, 1); renderEP(debtId); updateEPSum(debtId); }
function updatePctTot() {
  const tot = (window._ep || []).reduce((s, p) => s + (parseFloat(p.pct) || 0), 0);
  const el  = document.getElementById('pct-tot'), pw = document.getElementById('pw');
  const ok  = Math.abs(tot - 100) < 0.11;
  if (el)  { el.textContent = tot.toFixed(1) + '%'; el.style.background = ok ? 'var(--gnd)' : 'var(--rdd)'; el.style.color = ok ? 'var(--gn)' : 'var(--rd)'; }
  if (pw)  pw.classList.toggle('hidden', ok);
}
async function saveEP(debtId) {
  const tot = (window._ep || []).reduce((s, p) => s + (parseFloat(p.pct) || 0), 0);
  if (Math.abs(tot - 100) > 0.11) { UI.toast('Los % deben sumar 100%', 'error'); return; }
  const valid = (window._ep || []).filter(p => p.name && parseFloat(p.pct) > 0);
  await DB.saveParticipants(debtId, valid.map(p => ({ ...p, debt_id: debtId })));
  UI.toast('Participantes guardados ✅');
  const rows = Fin.annotated(debtId); updateEPSum(debtId, rows.find(r => r.status !== 'paid'));
}
function updateEPSum(debtId, nextRow) {
  const tb = document.getElementById('ep-sum');
  if (!tb) return;
  const debt = S.debts.find(d => d.id === debtId);
  const rows = (window._ep || []).filter(p => p.name && parseFloat(p.pct) > 0);
  if (!rows.length) { tb.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--tx3);padding:18px">Sin participantes</td></tr>'; return; }
  tb.innerHTML = rows.map(pp => {
    const share = parseFloat(pp.pct) || 0;
    const owes  = (+debt?.total_amount || 0) * (share / 100);
    const ppaid = S.instPayments.filter(p => p.part_id === pp.id && p.debt_id === debtId).reduce((s, p) => s + (+p.amount || 0), 0)
                + S.payments.filter(p => p.user_id === pp.user_id && p.debt_id === debtId).reduce((s, p) => s + (+p.amount || 0), 0);
    const due_  = Math.max(0, owes - ppaid);
    const nc    = nextRow ? nextRow.total * (share / 100) : 0;
    return `<tr><td class="tdm">${pp.name}</td><td class="tdn">${share}%</td><td class="tdn">${Fin.fmt(owes)}</td><td class="tdn txt-gn">${Fin.fmt(ppaid)}</td><td class="tdn ${due_ > 0 ? 'txt-rd' : ''} fw7">${Fin.fmt(due_)}</td><td class="tdn txt-am">${Fin.fmt(nc)}</td><td>${due_ <= 0 ? UI.chip('Al día', 'gn') : UI.chip('Debe', 'rd')}</td></tr>`;
  }).join('');
}

      ${showReviewedBy ? `<td style="font-size:10px;color:var(--tx3)">${p.reviewed_at ? new Date(p.reviewed_at).toLocaleDateString('es-EC') : '—'}${p.reviewer_note?`<br><span style="color:var(--tx3)">"${p.reviewer_note}"</span>`:''}</td>` : ''}

  </div>

  <div class="card mb4">
    <div class="card-hd">
      <div><div class="card-ti">⏳ Pendientes de aprobación</div>
      <div class="card-su">Pagos notificados que requieren tu validación · clic en "Revisar" para aprobar o rechazar</div></div>
      ${pending.length ? '' : ''}
    </div>
    <div class="tw"><table>
      <thead><tr><th>Fecha</th><th>Deuda / Deudor</th><th>Notas</th><th class="tdc">Comprobante</th><th>Reportó</th><th class="tdn">Monto</th><th></th></tr></thead>
      <tbody>${pending.length ? pending.map(p => renderRow(p, false)).join('') : '<tr><td colspan="7" style="text-align:center;color:var(--gn);padding:28px">✅ No hay pagos pendientes de aprobación</td></tr>'}</tbody>
    </table></div>

  ${approved.length ? `<div class="card mb4">

    </table></div>

// Recargar datos desde Supabase (útil cuando hay pagos pendientes)
async function refreshFromDB(showToast) {
  if (!sb || !user) return;
  try {
    await DB.loadAll();
    updateBadge();
    if (S.view === 'approvals') renderApprovals();
    else go(S.view, S.selDebt);
    if (showToast) UI.toast('🔄 Datos actualizados');
  } catch (e) { if (showToast) UI.toast('Error al recargar', 'error'); }
}

function renderDelinquency() {
  const overdue = [];
  S.debts.forEach(d => Fin.annotated(d.id).filter(a => a.status === 'overdue' || a.status === 'partial').forEach(a => overdue.push({ ...a, debtName: d.name, debtId: d.id })));
  const partDue = [];
  S.debts.forEach(debt => S.parts.filter(p => p.debt_id === debt.id).forEach(pp => {
    const { owes, paid, due } = Fin.partBalance(debt.id, pp.id);
    if (due > 0) partDue.push({ name: pp.name, debtName: debt.name, debtId: debt.id, owes, paid, due });
  }));

  document.getElementById('content').innerHTML = `
  <div class="kgrid" style="grid-template-columns:repeat(3,1fr);margin-bottom:18px">
    ${UI.kc('rd','Cuotas Vencidas',overdue.length,'','')}
    ${UI.kc('am','Monto Atrasado',Fin.fmt(overdue.reduce((s,o)=>s+o.total,0),true),'','')}
    ${UI.kc('pu','Participantes',partDue.length,'con saldo pendiente','')}
  </div>
  <div class="card mb4">
    <div class="card-hd"><div class="card-ti">⚠️ Cuotas Vencidas o Parciales</div></div>
    <div class="tw"><table>
      <thead><tr><th>Deuda</th><th>#</th><th>Vence</th><th>Días</th><th class="tdn">Capital</th><th class="tdn">Interés</th><th class="tdn">Total</th><th class="tdn">Pagado</th><th>Estado</th><th></th></tr></thead>
      <tbody>${overdue.length ? overdue.sort((a,b)=>a.due.localeCompare(b.due)).map(o => {
        const dias = Fin.daysSince(o.due);
        const pso = S.instPayments.filter(p => p.amort_id === o.id).reduce((s, p) => s + (+p.amount||0), 0);
        return `<tr class="ro">
          <td class="tdm">${o.debtName}</td><td>#${o.n}</td><td>${o.due}</td>
          <td>${UI.chip(dias+'d','rd')}</td>
          <td class="tdn">${Fin.fmt(o.cap)}</td><td class="tdn">${Fin.fmt(o.int)}</td>
          <td class="tdn fw7">${Fin.fmt(o.total)}</td>
          <td class="tdn txt-gn">${Fin.fmt(pso)}</td>
          <td>${UI.stChip(o.status)}</td>
          <td><button class="btn bg btn-xs" onclick="markPaid('${o.id}','${o.debtId}',null)">✅ Pagada</button></td>
        </tr>`;
      }).join('') : '<tr><td colspan="10" style="text-align:center;color:var(--gn);padding:28px">✅ Todo al día</td></tr>'}</tbody>
    </table></div>
  </div>
  ${partDue.length ? `<div class="card"><div class="card-hd"><div class="card-ti">🚨 Participantes con Saldo Pendiente</div></div>
  <div class="tw"><table>
    <thead><tr><th>Participante</th><th>Deuda</th><th class="tdn">Debe</th><th class="tdn">Ha Pagado</th><th class="tdn">Pendiente</th></tr></thead>
    <tbody>${partDue.sort((a,b)=>b.due-a.due).map(pp=>`<tr><td class="tdm">${pp.name}</td><td>${pp.debtName}</td><td class="tdn">${Fin.fmt(pp.owes)}</td><td class="tdn txt-gn">${Fin.fmt(pp.paid)}</td><td class="tdn txt-rd fw7">${Fin.fmt(pp.due)}</td></tr>`).join('')}</tbody>
  </table></div></div>` : ''}`;
}

        </div>
      </div>`}
      ${isEdit ? `<input type="hidden" name="ddir" value="${dir}"><input type="hidden" name="dhas_amort" value="${v.hasAmort?'yes':'no'}">` : ''}

      <div class="frow c2">
        <div class="fg" style="grid-column:1/-1"><label>Nombre</label><input type="text" id="dn" placeholder="Ej: Préstamo Banco Pichincha" value="${v.name.replace(/"/g,'&quot;')}"></div>
        <div class="fg" style="grid-column:1/-1"><label>Descripción</label><input type="text" id="dd" placeholder="Descripción breve" value="${v.desc.replace(/"/g,'&quot;')}"></div>
      </div>

      <!-- Borrower fields (only for incoming) -->
      <div id="borrower-opts" class="${dir==='incoming'?'':'hidden'}">
        <div class="frow c2">
          <div class="fg"><label>Nombre del deudor</label><input type="text" id="d-bname" placeholder="Ej: Carlos Mendoza" value="${v.bname.replace(/"/g,'&quot;')}"></div>
          <div class="fg"><label>Email del deudor (opcional)</label><input type="email" id="d-bemail" placeholder="carlos@email.com" value="${v.bemail.replace(/"/g,'&quot;')}"></div>
        </div>
        ${!isEdit ? `<div class="alrt as_" style="font-size:11px;margin-bottom:10px">
          🔗 Se generará automáticamente un link público para que esta persona vea el estado de su deuda.
        </div>`:''}
      </div>

      <div class="frow c3">
        <div class="fg"><label>Tipo</label>
          <select id="dtype" onchange="onDebtTypeChange()">
            <option value="loan" ${v.type==='loan'?'selected':''}>Préstamo</option>
            <option value="credit_card" ${v.type==='credit_card'?'selected':''}>Tarjeta de Crédito</option>
            <option value="personal" ${v.type==='personal'?'selected':''}>Personal</option>
          </select></div>
        <div class="fg"><label>Monto Total ($)</label><input type="number" id="damt" placeholder="10000" min="0" step="0.01" value="${v.amt}" oninput="calcCuota()"></div>
        <div class="fg" id="rate-fg"><label>Tasa Anual (%)</label><input type="number" id="drate" placeholder="12" min="0" step="0.01" value="${v.rate}" oninput="calcCuota()"></div>
      </div>
      <div id="cc-opts" class="${v.type==='credit_card'?'':'hidden'}">
        <div class="frow c2">
          <div class="fg"><label>Saldo Actual Tarjeta ($)</label><input type="number" id="dcc-bal" placeholder="1500" min="0" step="0.01" value="${v.ccBal}"></div>
          <div class="fg" style="padding-top:20px;display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="dcc-amort" ${v.ccAmort?'checked':''} style="accent-color:var(--am)" onchange="onDebtTypeChange()">
            <label for="dcc-amort" style="font-size:12px;color:var(--tx2);text-transform:none;letter-spacing:0;margin:0">También tiene cuotas fijas</label>
          </div>
        </div>
      </div>
      <div id="amort-opts" class="${(!v.hasAmort) || (v.type==='credit_card' && !v.ccAmort) ? 'hidden':''}">
        <div class="frow c3">
          <div class="fg"><label>Fecha Inicio</label><input type="date" id="dstart" value="${v.start}"></div>
          <div class="fg"><label>Plazo (meses)</label><input type="number" id="dmonths" placeholder="24" min="1" value="${v.months}" oninput="calcCuota()"></div>
          <div class="fg"><label>Cuota estimada</label><input type="text" id="dcuota" readonly style="opacity:.5" placeholder="Auto"></div>
        </div>
      </div>
      <div id="noamort-opts" class="${v.hasAmort ? 'hidden':''}">
        <div class="frow c2">
          <div class="fg"><label>Fecha Inicio</label><input type="date" id="dstart-na" value="${v.start}"></div>
          <div class="fg" style="padding-top:20px">
            <div class="alrt as_" style="font-size:11px;margin:0">
              💡 Esta deuda <strong>no tiene cuotas fijas</strong>. Se irá pagando con abonos libres hasta liquidar el saldo.
            </div>
          </div>
        </div>
      </div>
      ${!isEdit ? `<div class="alrt aw" style="margin-top:4px;font-size:11px" id="amort-hint">💡 La tabla de amortización se genera automáticamente (sistema francés) · O puedes importarla desde CSV después</div>` : ''}
    </div>
    <div class="mft">
      <button class="btn bs" onclick="UI.cm()">Cancelar</button>
      <button class="btn bp" onclick="${isEdit?`saveEditedDebt('${opts.editId}')`:'saveDebt()'}" id="bsd">${isEdit?'💾 Guardar Cambios':'Crear'}</button>
    </div>
  </div></div>`);

  // Calcular cuota inicial si estamos editando
  if (isEdit) setTimeout(calcCuota, 50);
}

// Toggle de "con/sin cuotas"
function onAmortKindChange() {
  const hasAmort = document.querySelector('input[name="dhas_amort"]:checked')?.value === 'yes';
  document.getElementById('amort-opts')?.classList.toggle('hidden', !hasAmort);
  document.getElementById('noamort-opts')?.classList.toggle('hidden', hasAmort);
  // Update visual styling
  const yes = document.getElementById('amrt-yes-lbl'), no = document.getElementById('amrt-no-lbl');
  if (yes) yes.style.borderColor = hasAmort ? 'var(--am)' : 'var(--bd2)';
  if (no)  no.style.borderColor  = hasAmort ? 'var(--bd2)' : 'var(--bl)';
  // Hint
  const hint = document.getElementById('amort-hint');
  if (hint) hint.textContent = hasAmort
    ? '💡 La tabla de amortización se genera automáticamente (sistema francés) · O puedes importarla desde CSV después'
    : '💡 No se generará tabla de cuotas. Registrarás abonos libres y la deuda se liquidará cuando el saldo llegue a cero.';
}

function onDirectionChange() {
  const dir = document.querySelector('input[name="ddir"]:checked')?.value || 'outgoing';
  document.getElementById('borrower-opts').classList.toggle('hidden', dir !== 'incoming');
  // Update visual styling on labels
  const out = document.getElementById('dir-out-lbl'), inc = document.getElementById('dir-in-lbl');
  if (out) out.style.borderColor = dir === 'outgoing' ? 'var(--rd)' : 'var(--bd2)';
  if (inc) inc.style.borderColor = dir === 'incoming' ? 'var(--gn)' : 'var(--bd2)';
}

function onDebtTypeChange() {
  const isCC = document.getElementById('dtype').value === 'credit_card';
  document.getElementById('cc-opts').classList.toggle('hidden', !isCC);
  const showAmort = !isCC || document.getElementById('dcc-amort')?.checked;
  document.getElementById('amort-opts').classList.toggle('hidden', isCC && !showAmort);
}

function calcCuota() {
  const p = parseFloat(document.getElementById('damt').value) || 0;
  const r = parseFloat(document.getElementById('drate').value) || 0;
  const n = parseInt(document.getElementById('dmonths').value) || 0;
  if (p && n) {
    const rm = r / 100 / 12;
    const c  = rm === 0 ? p / n : p * rm * Math.pow(1 + rm, n) / (Math.pow(1 + rm, n) - 1);
    document.getElementById('dcuota').value = Fin.fmt(c);
  }
}

async function saveDebt() {
  const name   = document.getElementById('dn').value.trim();
  const type   = document.getElementById('dtype').value;
  const amt    = parseFloat(document.getElementById('damt').value);
  const rate   = parseFloat(document.getElementById('drate').value) || 0;
  const desc   = document.getElementById('dd').value.trim();
  const ccBal  = parseFloat(document.getElementById('dcc-bal')?.value) || 0;
  const ccAmort= document.getElementById('dcc-amort')?.checked || false;
  const direction = document.querySelector('input[name="ddir"]:checked')?.value || 'outgoing';
  const hasAmort  = (document.querySelector('input[name="dhas_amort"]:checked')?.value || 'yes') === 'yes';
  const borrowerName  = document.getElementById('d-bname')?.value.trim() || null;
  const borrowerEmail = document.getElementById('d-bemail')?.value.trim() || null;

  // Fecha de inicio: depende de si hay amortización
  const start  = hasAmort
    ? document.getElementById('dstart').value
    : (document.getElementById('dstart-na')?.value || new Date().toISOString().split('T')[0]);
  const months = hasAmort ? (parseInt(document.getElementById('dmonths').value) || 0) : 0;

  if (!name || !amt) { const e = document.getElementById('derr'); e.textContent = 'Nombre y monto requeridos'; e.classList.remove('hidden'); return; }
  if (direction === 'incoming' && !borrowerName) { const e = document.getElementById('derr'); e.textContent = 'El nombre del deudor es requerido'; e.classList.remove('hidden'); return; }
  if (hasAmort && (!start || !months)) { const e = document.getElementById('derr'); e.textContent = 'Para deuda con cuotas: fecha de inicio y plazo son requeridos'; e.classList.remove('hidden'); return; }

  document.getElementById('bsd').disabled = true;
  try {
    const fwd = n => { const d = new Date(start + 'T12:00:00'); d.setMonth(d.getMonth() + n); return d.toISOString().split('T')[0]; };
    const publicToken = direction === 'incoming' ? ('tok_' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36)) : null;
    await DB.createDebt({
      name, type, total_amount: amt, interest_rate: rate, start_date: start,
      end_date_estimated: (hasAmort && months) ? fwd(months) : null, description: desc,
      months: (hasAmort && (type !== 'credit_card' || ccAmort)) ? months : 0,
      cc_balance: ccBal, cc_has_amort: ccAmort,
      direction, public_token: publicToken,
      borrower_name: borrowerName, borrower_email: borrowerEmail,
      has_amort: hasAmort,
    });
    UI.cm(); updateBadge();
    go(direction === 'incoming' ? 'receivables' : 'debts');
    UI.toast(`"${name}" creada ✅`);
  } catch (e) { const el = document.getElementById('derr'); el.textContent = e.message || 'Error'; el.classList.remove('hidden'); document.getElementById('bsd').disabled = false; }
}

async function saveEditedDebt(debtId) {
  const debt = S.debts.find(d => d.id === debtId);
  if (!debt) return UI.toast('Deuda no encontrada', 'error');

  const name   = document.getElementById('dn').value.trim();
  const type   = document.getElementById('dtype').value;
  const amt    = parseFloat(document.getElementById('damt').value);
  const rate   = parseFloat(document.getElementById('drate').value) || 0;
  const desc   = document.getElementById('dd').value.trim();
  const ccBal  = parseFloat(document.getElementById('dcc-bal')?.value) || 0;
  const ccAmort= document.getElementById('dcc-amort')?.checked || false;
  const direction = debt.direction || 'outgoing';
  const hasAmort  = Fin.hasAmort(debt); // ← se preserva, no se puede cambiar al editar
  const borrowerName  = document.getElementById('d-bname')?.value.trim() || null;
  const borrowerEmail = document.getElementById('d-bemail')?.value.trim() || null;

  // Si la deuda es sin amortización, leer fecha del input alternativo
  const start  = hasAmort ? document.getElementById('dstart').value : (document.getElementById('dstart-na')?.value || debt.start_date);
  const months = hasAmort ? (parseInt(document.getElementById('dmonths').value) || 0) : 0;

  if (!name || !amt) { const e = document.getElementById('derr'); e.textContent = 'Nombre y monto requeridos'; e.classList.remove('hidden'); return; }
  if (direction === 'incoming' && !borrowerName) { const e = document.getElementById('derr'); e.textContent = 'El nombre del deudor es requerido'; e.classList.remove('hidden'); return; }

  // Detectar si cambian campos que afectan amortización (solo si tiene amort)
  const amortChanged = hasAmort && (
    (+debt.total_amount !== +amt) ||
    (+(debt.interest_rate || 0) !== +rate) ||
    (+(debt.months || 0) !== +months) ||
    (debt.start_date !== start)
  );
  const debtMonths = hasAmort ? ((type !== 'credit_card' || ccAmort) ? months : 0) : 0;
  const willHaveAmort = hasAmort && debtMonths > 0 && amt > 0 && start;

  let regen = false;
  if (amortChanged && willHaveAmort) {
    regen = confirm(
      '¿Regenerar la tabla de amortización?\n\n' +
      'Cambiaste monto/tasa/plazo/fecha. Los pagos ya registrados se conservan por número de cuota.\n\n' +
      'OK = Regenerar tabla\nCancelar = Solo actualizar datos sin tocar la tabla'
    );
  }

  document.getElementById('bsd').disabled = true;
  try {
    const fwd = n => { const d = new Date(start + 'T12:00:00'); d.setMonth(d.getMonth() + n); return d.toISOString().split('T')[0]; };
    const patch = {
      name, description: desc, type,
      total_amount: amt, interest_rate: rate, start_date: start,
      months: debtMonths, end_date_estimated: debtMonths ? fwd(debtMonths) : null,
      cc_balance: ccBal, cc_has_amort: ccAmort,
      borrower_name: borrowerName, borrower_email: borrowerEmail,
      has_amort: hasAmort,
    };
    await DB.updateDebt(debtId, patch);
    if (regen) await DB.regenerateAmort(debtId, amt, rate, debtMonths, start);

    UI.cm(); updateBadge();
    go(S.view, S.selDebt);
    UI.toast(`✏️ "${name}" actualizada${regen ? ' · tabla regenerada' : ''}`);
  } catch (e) {
    const el = document.getElementById('derr'); el.textContent = e.message || 'Error';
    el.classList.remove('hidden'); document.getElementById('bsd').disabled = false;
  }
}

/* ═══════════════════════════════════════════════════════════
   DELETE CONFIRM
═══════════════════════════════════════════════════════════ */
function confirmDel(id) {
  const d = S.debts.find(x => x.id === id);
  UI.modal(`<div class="mover"><div class="modal" style="max-width:370px">
    <div class="mhd"><div class="mti">Eliminar Deuda</div><button class="mcl" onclick="UI.cm()">✕</button></div>
    <div class="mbd"><p style="color:var(--tx2)">¿Eliminar "<strong>${d?.name}</strong>" junto con todos sus pagos y cuotas?</p><p style="color:var(--rd);margin-top:8px;font-size:12px">Esta acción no se puede deshacer.</p></div>
    <div class="mft"><button class="btn bs" onclick="UI.cm()">Cancelar</button><button class="btn bd_" onclick="doDel('${id}')">Eliminar</button></div>
  </div></div>`);
}
async function doDel(id) { await DB.deleteDebt(id); UI.cm(); updateBadge(); go('debts'); UI.toast('Deuda eliminada', 'warn'); }

/* ═══════════════════════════════════════════════════════════
   SESSION
═══════════════════════════════════════════════════════════ */
async function checkSession() {
  if (!sb) return;
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) { user = session.user; await initApp(); }
  } catch (e) {}
}
checkSession();
</script>
