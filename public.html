<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Estado de Deuda — DebtOS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   PUBLIC VIEW — read-only, no login
═══════════════════════════════════════════════════════════ */
[data-theme="dark"]{
  --bg:#08090f; --bg2:#0d0f1a; --bg3s:#131626;
  --bd:#1c1f33; --bd2:#272b48;
  --tx:#dde0f0; --tx2:#7880a8; --tx3:#3e4460;
  --am:#f59e0b; --amd:#261800;
  --gn:#10b981; --gnd:#052015;
  --rd:#ef4444; --rdd:#200808;
  --bl:#3b82f6; --bld:#060e24;
  --pu:#8b5cf6; --pud:#0f0920;
  --sh:0 8px 32px rgba(0,0,0,.6);
}
[data-theme="light"]{
  --bg:#f2f4f9; --bg2:#ffffff; --bg3s:#f7f8fc;
  --bd:#e2e5f0; --bd2:#c8ccde;
  --tx:#161828; --tx2:#40497a; --tx3:#8890b8;
  --am:#d97706; --amd:#fef3c7;
  --gn:#059669; --gnd:#d1fae5;
  --rd:#dc2626; --rdd:#fee2e2;
  --bl:#2563eb; --bld:#dbeafe;
  --pu:#7c3aed; --pud:#ede9fe;
  --sh:0 4px 20px rgba(0,0,0,.08);
}
:root{ --r:8px; --r2:12px; --r3:16px; --fh:'Inter',-apple-system,sans-serif; --fm:'Inter',-apple-system,sans-serif; --fmono:'JetBrains Mono','Menlo',monospace; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--tx);font-family:var(--fm);font-size:13px;line-height:1.6;
  -webkit-font-smoothing:antialiased;min-height:100vh;
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

.wrap{max-width:980px;margin:0 auto;padding:24px 18px}

/* Header */
.phead{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid var(--bd);
  flex-wrap:wrap;gap:10px;
}
.brand{font-family:var(--fh);font-size:20px;font-weight:700;color:var(--am);letter-spacing:-.02em}
.brand-sub{font-size:9px;color:var(--tx3);letter-spacing:1.4px;text-transform:uppercase;font-weight:500}
.theme-btn{
  background:transparent;border:1px solid var(--bd2);border-radius:var(--r);
  color:var(--tx2);padding:6px 11px;font-family:var(--fm);font-size:12px;
  cursor:pointer;transition:all .13s;
}
.theme-btn:hover{border-color:var(--am);color:var(--am)}

/* Hero card */
.hero{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r3);
  padding:24px;margin-bottom:18px;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--am),var(--gn));
}
.hero-title{font-family:var(--fh);font-size:22px;font-weight:800;margin-bottom:4px}
.hero-sub{font-size:12px;color:var(--tx3);margin-bottom:18px}
.hero-borrower{
  display:inline-flex;align-items:center;gap:6px;padding:5px 11px;
  background:var(--bld);color:var(--bl);border-radius:20px;font-size:11px;
  border:1px solid rgba(59,130,246,.2);margin-bottom:8px;
}

/* KPIs */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:18px}
.kc{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);
  padding:14px 16px;position:relative;overflow:hidden;
}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kc.am::before{background:var(--am)} .kc.gn::before{background:var(--gn)}
.kc.rd::before{background:var(--rd)} .kc.bl::before{background:var(--bl)}
.kc.pu::before{background:var(--pu)}
.klbl{font-size:9px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.kval{font-family:var(--fmono);font-size:18px;font-weight:600;line-height:1.1;letter-spacing:-.3px}
.ksub{font-size:10px;color:var(--tx3);margin-top:4px}

/* Status badge */
.status-pill{
  display:inline-flex;align-items:center;gap:6px;padding:6px 14px;
  border-radius:20px;font-family:var(--fh);font-size:13px;font-weight:700;
  margin-top:8px;
}
.status-pill.ok{background:var(--gnd);color:var(--gn);border:1px solid rgba(16,185,129,.3)}
.status-pill.late{background:var(--rdd);color:var(--rd);border:1px solid rgba(239,68,68,.3)}
.status-pill.partial{background:var(--amd);color:var(--am);border:1px solid rgba(245,158,11,.3)}
.status-pill .dot{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Progress */
.pwrap{margin:14px 0}
.pbar{height:10px;background:var(--bg3s);border-radius:5px;overflow:hidden;border:1px solid var(--bd)}
.pfill{height:100%;background:linear-gradient(90deg,var(--gn),var(--am));border-radius:5px;transition:width 1s ease}
.pinfo{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-top:6px}

/* Cards */
.card{
  background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);
  padding:18px;margin-bottom:14px;
}
.card-ti{font-family:var(--fh);font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* Tables */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse;min-width:420px}
thead tr{background:var(--bg3s)}
th{
  text-align:left;padding:8px 12px;font-size:9px;
  color:var(--tx3);letter-spacing:1.1px;text-transform:uppercase;
  font-weight:500;border-bottom:1px solid var(--bd);white-space:nowrap;
}
td{padding:9px 12px;font-size:12px;color:var(--tx2);border-bottom:1px solid var(--bd)}
tbody tr:last-child td{border-bottom:none}
.tdm{color:var(--tx);font-weight:500}
.tdn{text-align:right;font-family:var(--fmono);font-variant-numeric:tabular-nums}

.rp>td{opacity:.4}
.ro>td{background:var(--rdd)!important;color:var(--rd)!important}
.ro>.tdm{color:var(--rd)!important;font-weight:600}

/* Chips */
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.cgn{background:var(--gnd);color:var(--gn);border:1px solid rgba(16,185,129,.2)}
.crd{background:var(--rdd);color:var(--rd);border:1px solid rgba(239,68,68,.2)}
.cam{background:var(--amd);color:var(--am);border:1px solid rgba(245,158,11,.2)}

/* Footer */
.foot{
  text-align:center;font-size:11px;color:var(--tx3);
  margin-top:24px;padding-top:18px;border-top:1px solid var(--bd);
}
.foot a{color:var(--am);text-decoration:none}

/* Loader / Error */
.center-screen{
  min-height:80vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;text-align:center;padding:20px;
}
.spinner{
  width:32px;height:32px;border:3px solid var(--bd2);border-top-color:var(--am);
  border-radius:50%;animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{
  background:var(--rdd);border:1px solid rgba(239,68,68,.3);border-radius:var(--r2);
  padding:24px;max-width:420px;
}

/* Read-only banner */
.ro-banner{
  background:var(--bld);border:1px solid rgba(59,130,246,.25);
  border-radius:var(--r);padding:8px 13px;font-size:11px;color:var(--bl);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}

@media(max-width:600px){
  .wrap{padding:16px 12px}
  .hero{padding:18px}
  .hero-title{font-size:18px}
  .kgrid{grid-template-columns:1fr 1fr}
  .kval{font-size:17px}
}
@media(max-width:380px){
  .kgrid{grid-template-columns:1fr}
}

/* ── REPORT MODAL ── */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:14px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--bd)}
.mti{font-family:var(--fh);font-size:14px;font-weight:700}
.mcl{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:16px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.mcl:hover{background:var(--bg3s);color:var(--tx)}
.mbd{padding:16px 20px}
.mft{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--bd)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:10px;color:var(--tx3);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.fg input,.fg textarea{width:100%;background:var(--bg3s);border:1px solid var(--bd2);border-radius:6px;padding:8px 11px;color:var(--tx);font-family:var(--fm);font-size:13px;outline:none;transition:border-color .13s}
.fg input:focus,.fg textarea:focus{border-color:var(--gn)}
.fg textarea{resize:vertical;min-height:60px}
.frow{display:grid;gap:10px;grid-template-columns:1fr 1fr}
.btn-x{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:6px;font-family:var(--fm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .13s}
.btn-cancel{background:transparent;color:var(--tx2);border-color:var(--bd2)}
.btn-cancel:hover{border-color:var(--rd);color:var(--rd)}
.btn-confirm{background:var(--gn);color:#021008;border-color:var(--gn);font-weight:700}
.btn-confirm:hover{opacity:.9}
.btn-confirm:disabled{opacity:.5;cursor:not-allowed}
.alrt-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);color:var(--bl);padding:10px 12px;border-radius:6px;font-size:12px;margin-bottom:12px}
.alrt-err {background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.25); color:var(--rd);padding:10px 12px;border-radius:6px;font-size:12px;margin-bottom:12px}
.alrt-ok  {background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--gn);padding:10px 12px;border-radius:6px;font-size:12px;margin-bottom:12px}
</style>
</head>
<body>

<div class="wrap" id="root">
  <!-- Initial loader -->
  <div class="center-screen" id="loader-screen">
    <div class="spinner"></div>
    <div style="font-size:12px;color:var(--tx3)">Cargando estado de tu deuda…</div>
  </div>
</div>

<!-- Modal container -->
<div id="modal-container"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG (mismo que app principal)
═══════════════════════════════════════════════════════════ */
const SB_URL = 'https://ziyhgftbkobhuuekuqpc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppeWhnZnRia29iaHV1ZWt1cXBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTAxMzEsImV4cCI6MjA5MzM4NjEzMX0.OojV0IkL7lqgkHMOopn4n2Ep0WzpkULMi8FZqETscIM';
let sb = null;
try { sb = supabase.createClient(SB_URL, SB_KEY); } catch(e) {}

/* ── Theme persistente ── */
(function(){
  const t = localStorage.getItem('debtos-theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
})();
function toggleTheme(){
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  const next = dark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('debtos-theme', next);
  document.querySelectorAll('.theme-btn').forEach(b => b.textContent = next === 'dark' ? '☀️' : '🌙');
}

/* ═══════════════════════════════════════════════════════════
   FORMAT HELPERS
═══════════════════════════════════════════════════════════ */
const fmt = (n, short) => {
  if (isNaN(n) || n == null) return '$0.00';
  const v = Math.abs(parseFloat(n));
  const sign = n < 0 ? '-' : '';
  if (short && v >= 1000) return sign + '$' + (v / 1000).toFixed(1) + 'k';
  return sign + '$' + v.toLocaleString('es-EC', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
};
const todayISO = () => new Date().toISOString().split('T')[0];
const daysSince = s => Math.floor((Date.now() - new Date(s + 'T12:00:00')) / 86400000);
const fmtDate = s => {
  if (!s) return '—';
  const d = new Date(s + 'T12:00:00');
  return d.toLocaleDateString('es-EC', { day: '2-digit', month: 'short', year: 'numeric' });
};

/* ═══════════════════════════════════════════════════════════
   GET TOKEN FROM URL
═══════════════════════════════════════════════════════════ */
function getToken() {
  const params = new URLSearchParams(location.search);
  return params.get('token');
}

/* ═══════════════════════════════════════════════════════════
   DATA LAYER
═══════════════════════════════════════════════════════════ */
async function fetchPublicDebt(token) {
  if (!sb) throw new Error('Supabase no configurado');

  // Una sola query por token (NUNCA exponemos owner_user_id al cliente)
  const { data: debt, error: e1 } = await sb
    .from('debts')
    .select('id,name,description,type,total_amount,interest_rate,start_date,months,direction,public_token,borrower_name,cc_balance')
    .eq('public_token', token)
    .eq('direction', 'incoming')
    .maybeSingle();
  if (e1) throw e1;
  if (!debt) return null;

  const debtId = debt.id;
  const [{ data: amorts }, { data: payments }, { data: instPays }] = await Promise.all([
    sb.from('amortizations').select('id,debt_id,n,due,cap,int,total,bal,paid_date').eq('debt_id', debtId).order('n'),
    sb.from('payments').select('id,debt_id,amount,payment_date,notes,receipt_url').eq('debt_id', debtId).order('payment_date', { ascending: false }),
    sb.from('installment_payments').select('id,debt_id,amort_id,amount,paid_date,notes,receipt_url').eq('debt_id', debtId).order('paid_date', { ascending: false }),
  ]);

  return { debt, amorts: amorts || [], payments: payments || [], instPays: instPays || [] };
}

/* ═══════════════════════════════════════════════════════════
   ANNOTATE AMORTIZATION ROWS (status)
═══════════════════════════════════════════════════════════ */
function annotateAmorts(amorts, instPays) {
  const today = todayISO();
  return [...amorts].sort((a,b)=>a.n-b.n).map(a => {
    if (a.paid_date) return { ...a, status: 'paid' };
    const ips   = instPays.filter(p => p.amort_id === a.id);
    const total = ips.reduce((s,p) => s + (+p.amount||0), 0);
    const paidByInst = total >= a.total * 0.99;
    const partial    = total > 0 && !paidByInst;
    const status = paidByInst ? 'paid' : partial ? 'partial' : a.due < today ? 'overdue' : 'pending';
    return { ...a, status, instTotal: total };
  });
}

/* ═══════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════ */
function renderError(msg, sub) {
  document.getElementById('root').innerHTML = `
  <div class="phead">
    <div><div class="brand">DebtOS</div><div class="brand-sub">Vista pública · v5.4</div></div>
    <button class="theme-btn" onclick="toggleTheme()">${document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'}</button>
  </div>
  <div class="center-screen">
    <div class="error-box">
      <div style="font-size:32px;margin-bottom:8px">🔒</div>
      <div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--rd);margin-bottom:6px">${msg}</div>
      <div style="font-size:12px;color:var(--tx2)">${sub || ''}</div>
    </div>
  </div>`;
}

function renderPublic(data) {
  const { debt, amorts, payments, instPays } = data;
  window._debtData = data; // guardar para modales

  // Filtrar SOLO pagos aprobados para cálculos de saldo
  const isApproved = p => !p.status || p.status === 'approved';
  const isPending  = p => p.status === 'pending';
  const isRejected = p => p.status === 'rejected';

  const approvedPays    = payments.filter(isApproved);
  const approvedInst    = instPays.filter(isApproved);
  const pendingPays     = [...payments.filter(isPending), ...instPays.filter(isPending)];
  const rejectedPays    = [...payments.filter(isRejected), ...instPays.filter(isRejected)];

  // Calcular totales (solo aprobados)
  const totalPaid = approvedPays.reduce((s,p) => s+(+p.amount||0), 0)
                  + approvedInst.reduce((s,p) => s+(+p.amount||0), 0);
  const total     = +debt.total_amount || 0;
  const remaining = Math.max(0, total - totalPaid);
  const pct       = total ? Math.min(100, totalPaid/total*100) : 0;

  // Anotar amortización (con instPays APROBADOS para no inflar saldos)
  const annotated = annotateAmorts(amorts, approvedInst);
  const overdueRows = annotated.filter(a => a.status === 'overdue' || a.status === 'partial');
  const upcoming    = annotated.filter(a => a.status === 'pending').slice(0, 3);

  // Estado global
  let statusLbl, statusCls;
  if (remaining <= 0.01) {
    statusLbl = '✅ Deuda Pagada Completamente';
    statusCls = 'ok';
  } else if (overdueRows.length > 0) {
    statusLbl = `⚠️ Cuenta con Atraso (${overdueRows.length} cuota${overdueRows.length>1?'s':''})`;
    statusCls = 'late';
  } else {
    statusLbl = '✅ Al Día';
    statusCls = 'ok';
  }

  // Combinar todos los pagos para tabla unificada — incluyendo status
  const allPayments = [
    ...payments.map(p => ({ ...p, _type: 'general', date: p.payment_date })),
    ...instPays.map(p => ({ ...p, _type: 'cuota', date: p.paid_date })),
  ].sort((a,b) => (b.date||'').localeCompare(a.date||''));

  document.getElementById('root').innerHTML = `
  <div class="phead">
    <div>
      <div class="brand">DebtOS</div>
      <div class="brand-sub">Vista pública · v5.4</div>
      <div style="font-size:10px;color:var(--tx3);margin-top:4px;display:flex;align-items:center;gap:6px">
        <span style="display:inline-block;width:6px;height:6px;background:var(--gn);border-radius:50%;box-shadow:0 0 6px rgba(16,185,129,.4)"></span>
        Actualizado · ${new Date().toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'})}
        <a href="javascript:location.reload()" style="color:var(--am);text-decoration:none;margin-left:4px;font-weight:500">↻ recargar</a>
      </div>
    </div>
    <button class="theme-btn" onclick="toggleTheme()">${document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'}</button>
  </div>

  <div class="ro-banner">
    🔒 <strong>Vista compartida</strong> · Aquí puedes ver el estado actualizado de tu deuda y <strong>reportar pagos realizados</strong>. El acreedor recibirá la notificación y la aprobará.
  </div>

  <!-- Hero -->
  <div class="hero">
    ${debt.borrower_name ? `<div class="hero-borrower">👤 ${debt.borrower_name}</div>` : ''}
    <div class="hero-title">${debt.name}</div>
    <div class="hero-sub">${debt.description || 'Sin descripción'} · Inicio: ${fmtDate(debt.start_date)}${debt.months ? ' · Plazo: '+debt.months+' meses' : ''}${debt.interest_rate ? ' · Tasa: '+debt.interest_rate+'% anual' : ''}</div>
    <div class="status-pill ${statusCls}"><span class="dot"></span>${statusLbl}</div>

    <div class="pwrap">
      <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
      <div class="pinfo">
        <span><strong style="color:var(--gn)">${fmt(totalPaid)}</strong> pagado</span>
        <span>${pct.toFixed(1)}%</span>
        <span>de <strong>${fmt(total)}</strong></span>
      </div>
    </div>

    ${remaining > 0.01 ? `<div style="text-align:center;margin-top:14px">
      <button onclick="modalReportPayment()" style="background:var(--gn);color:#021008;border:none;padding:10px 22px;border-radius:8px;font-family:var(--fm);font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(16,185,129,.3)">
        📤 Reportar un pago realizado
      </button>
      ${pendingPays.length > 0 ? `<div style="margin-top:8px;font-size:11px;color:var(--am)">⏳ Tienes ${pendingPays.length} pago${pendingPays.length>1?'s':''} esperando aprobación del acreedor</div>` : ''}
    </div>` : ''}
  </div>

  <!-- KPIs -->
  <div class="kgrid">
    <div class="kc bl"><div class="klbl">Monto Total</div><div class="kval">${fmt(total, true)}</div><div class="ksub">capital original</div></div>
    <div class="kc gn"><div class="klbl">Pagado</div><div class="kval" style="color:var(--gn)">${fmt(totalPaid, true)}</div><div class="ksub">${pct.toFixed(1)}% completado</div></div>
    <div class="kc ${remaining > 0 ? 'rd' : 'gn'}"><div class="klbl">Saldo Pendiente</div><div class="kval" style="color:${remaining > 0 ? 'var(--rd)' : 'var(--gn)'}">${fmt(remaining, true)}</div><div class="ksub">${remaining > 0 ? 'aún por pagar' : '¡Liquidada!'}</div></div>
    <div class="kc ${overdueRows.length > 0 ? 'rd' : 'am'}"><div class="klbl">Cuotas Atrasadas</div><div class="kval">${overdueRows.length}</div><div class="ksub">${overdueRows.length === 0 ? 'al día' : 'requieren atención'}</div></div>
  </div>

  ${overdueRows.length > 0 ? `
  <!-- Overdue alert -->
  <div class="card" style="border-color:rgba(239,68,68,.3);background:linear-gradient(135deg,var(--rdd) 0%,var(--bg2) 60%)">
    <div class="card-ti" style="color:var(--rd)">⚠️ Cuotas Atrasadas — Requieren Atención</div>
    <div class="tw"><table>
      <thead><tr><th>#</th><th>Vencimiento</th><th>Días Atraso</th><th class="tdn">Capital</th><th class="tdn">Interés</th><th class="tdn">Cuota</th><th>Estado</th></tr></thead>
      <tbody>${overdueRows.map(r => `<tr class="ro">
        <td class="tdm">#${r.n}</td>
        <td>${fmtDate(r.due)}</td>
        <td><span class="chip crd">${daysSince(r.due)} días</span></td>
        <td class="tdn">${fmt(r.cap)}</td>
        <td class="tdn">${fmt(r.int)}</td>
        <td class="tdn" style="font-weight:700">${fmt(r.total)}</td>
        <td>${r.status === 'partial' ? '<span class="chip cam">Parcial</span>' : '<span class="chip crd">Atrasada</span>'}</td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>` : ''}

  ${upcoming.length > 0 ? `
  <!-- Upcoming -->
  <div class="card">
    <div class="card-ti">📅 Próximas Cuotas</div>
    <div class="tw"><table>
      <thead><tr><th>#</th><th>Vencimiento</th><th class="tdn">Capital</th><th class="tdn">Interés</th><th class="tdn">Cuota</th><th class="tdn">Saldo restante</th></tr></thead>
      <tbody>${upcoming.map(r => `<tr>
        <td class="tdm">#${r.n}</td>
        <td>${fmtDate(r.due)} <span style="font-size:10px;color:var(--tx3)">(en ${-daysSince(r.due)} días)</span></td>
        <td class="tdn">${fmt(r.cap)}</td>
        <td class="tdn">${fmt(r.int)}</td>
        <td class="tdn" style="font-weight:700;color:var(--am)">${fmt(r.total)}</td>
        <td class="tdn">${fmt(r.bal)}</td>
      </tr>`).join('')}</tbody>
    </table></div>
  </div>` : ''}

  <!-- Full schedule -->
  ${annotated.length > 0 ? `
  <div class="card">
    <div class="card-ti">📋 Plan Completo de Pagos</div>
    <div class="tw"><table>
      <thead><tr><th>#</th><th>Vencimiento</th><th>Fecha de Pago</th><th class="tdn">Capital</th><th class="tdn">Interés</th><th class="tdn">Cuota</th><th>Estado</th></tr></thead>
      <tbody>${annotated.map(r => {
        const rc = r.status==='paid'?'rp' : (r.status==='overdue'||r.status==='partial')?'ro' : '';
        let chip;
        if (r.status==='paid')        chip = '<span class="chip cgn">✓ Pagada</span>';
        else if (r.status==='partial')chip = '<span class="chip cam">Parcial</span>';
        else if (r.status==='overdue')chip = '<span class="chip crd">Atrasada</span>';
        else                          chip = '<span class="chip cam">Pendiente</span>';
        return `<tr class="${rc}">
          <td class="tdm">#${r.n}</td>
          <td>${fmtDate(r.due)}</td>
          <td style="color:${r.paid_date ? 'var(--gn)' : 'var(--tx3)'}">${r.paid_date ? fmtDate(r.paid_date) : '—'}</td>
          <td class="tdn">${fmt(r.cap)}</td>
          <td class="tdn">${fmt(r.int)}</td>
          <td class="tdn" style="font-weight:600">${fmt(r.total)}</td>
          <td>${chip}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>` : ''}

  <!-- Payment history -->
  ${allPayments.length > 0 ? `
  <div class="card">
    <div class="card-ti">💸 Historial de Pagos</div>
    <div class="tw"><table>
      <thead><tr><th>Fecha</th><th>Tipo</th><th>Descripción</th><th class="tdc">📎</th><th>Estado</th><th class="tdn">Monto</th></tr></thead>
      <tbody>${allPayments.map(p => {
        let statusBadge;
        if (isPending(p))       statusBadge = '<span class="chip cam">⏳ Por aprobar</span>';
        else if (isRejected(p)) statusBadge = `<span class="chip crd" title="${(p.reviewer_note||'').replace(/"/g,'&quot;')}">✕ Rechazado</span>`;
        else                    statusBadge = '<span class="chip cgn">✓ Aprobado</span>';
        const amountStyle = isApproved(p) ? 'color:var(--gn);font-weight:700' : isRejected(p) ? 'color:var(--rd);text-decoration:line-through;opacity:.6' : 'color:var(--am);font-weight:700';
        return `<tr>
          <td class="tdm">${fmtDate(p.date)}</td>
          <td>${p._type === 'cuota' ? '<span class="chip cgn">Cuota</span>' : '<span class="chip cam">Abono</span>'}</td>
          <td style="color:var(--tx3)">${p.notes || '—'}${p.reported_by==='borrower'?'<br><span style="font-size:9px;color:var(--am)">📤 reportado por ti</span>':''}${isRejected(p) && p.reviewer_note?`<br><span style="font-size:9px;color:var(--rd)">Motivo: ${p.reviewer_note}</span>`:''}</td>
          <td class="tdc">${p.receipt_url ? `<a href="${p.receipt_url}" target="_blank" style="color:var(--am);text-decoration:none;font-size:13px" title="Ver comprobante">📎</a>` : '<span style="color:var(--tx3);font-size:10px">—</span>'}</td>
          <td>${statusBadge}</td>
          <td class="tdn" style="${amountStyle}">${fmt(p.amount)}</td>
        </tr>`;
      }).join('')}
      <tr style="border-top:2px solid var(--bd2)">
        <td colspan="5" class="tdm" style="color:var(--am)">Total Aprobado</td>
        <td class="tdn" style="color:var(--gn);font-weight:800;font-size:13px">${fmt(totalPaid)}</td>
      </tr>
      </tbody>
    </table></div>
    <div style="font-size:11px;color:var(--tx3);margin-top:10px;padding:8px 10px;background:var(--bg3s);border-radius:6px">
      ℹ️ Los pagos en estado <strong>"Por aprobar"</strong> aún no se cuentan en tu saldo. El acreedor los revisará y aprobará cuando confirme el ingreso del dinero.
    </div>
  </div>` : `<div class="card"><div class="card-ti">💸 Historial de Pagos</div><div style="text-align:center;color:var(--tx3);padding:20px">Aún no se han registrado pagos</div></div>`}

  <!-- Footer -->
  <div class="foot">
    Generado por <a href="javascript:void(0)" onclick="event.preventDefault()"><strong>DebtOS</strong></a> · Última actualización: ${new Date().toLocaleString('es-EC')}
    <br><span style="opacity:.6;font-size:10px">Esta vista es solo informativa. Los pagos deben realizarse directamente al acreedor.</span>
  </div>`;
}

/* ═══════════════════════════════════════════════════════════
   REPORT PAYMENT (deudor desde public.html)
═══════════════════════════════════════════════════════════ */
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function modalReportPayment() {
  const data = window._debtData;
  if (!data || !data.debt) return;
  const debt = data.debt;
  const today = new Date().toISOString().split('T')[0];

  // Sugerencia: cuota más próxima pendiente
  const annotated = annotateAmorts(data.amorts, data.instPays.filter(p => !p.status || p.status==='approved'));
  const nextRow = annotated.find(a => a.status === 'pending' || a.status === 'overdue' || a.status === 'partial');
  const suggestedAmt = nextRow ? nextRow.total.toFixed(2) : '';
  const suggestedNote = nextRow ? `Pago cuota #${nextRow.n}` : '';

  document.getElementById('modal-container').innerHTML = `<div class="mover" onclick="if(event.target===this) closeModal()"><div class="modal">
    <div class="mhd">
      <div class="mti">📤 Reportar Pago</div>
      <button class="mcl" onclick="closeModal()">✕</button>
    </div>
    <div class="mbd">
      <div class="alrt-info">
        <strong>${debt.name}</strong>${debt.borrower_name ? ' · ' + debt.borrower_name : ''}<br>
        <span style="font-size:11px;opacity:.85">Tu pago aparecerá como "Por aprobar" hasta que el acreedor lo confirme.</span>
      </div>

      <div class="frow">
        <div class="fg"><label>Monto pagado ($)</label><input type="number" id="rp-amt" min="0.01" step="0.01" value="${suggestedAmt}" placeholder="100.00"></div>
        <div class="fg"><label>Fecha del pago</label><input type="date" id="rp-date" value="${today}" max="${today}"></div>
      </div>

      <div class="fg"><label>Notas / referencia (opcional)</label>
        <textarea id="rp-notes" placeholder="Ej: depósito Banco Pichincha · ref 12345">${suggestedNote}</textarea>
      </div>

      <div class="fg"><label>📎 Comprobante (foto del depósito/transferencia) — recomendado</label>
        <input type="file" id="rp-file" accept="image/*,.pdf" capture="environment" onchange="previewReportFile(this)" style="font-size:12px">
        <div id="rp-prev"></div>
      </div>

      <div id="rp-err" class="alrt-err" style="display:none"></div>
    </div>
    <div class="mft">
      <button class="btn-x btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-x btn-confirm" id="rp-submit" onclick="submitReportPayment()">📤 Enviar reporte</button>
    </div>
  </div></div>`;
}

function previewReportFile(input) {
  const file = input.files[0];
  const prev = document.getElementById('rp-prev');
  if (!file) { prev.innerHTML = ''; return; }
  if (file.size > 5 * 1024 * 1024) {
    prev.innerHTML = '<div style="color:var(--rd);font-size:11px;margin-top:6px">⚠️ Archivo muy grande (máx 5MB)</div>';
    input.value = ''; return;
  }
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = e => {
      prev.innerHTML = `<div style="margin-top:8px;padding:6px;background:var(--bg3s);border:1px solid var(--bd);border-radius:6px;display:flex;gap:8px;align-items:center">
        <img src="${e.target.result}" style="width:60px;height:60px;object-fit:cover;border-radius:6px">
        <div style="flex:1;min-width:0">
          <div style="font-size:11px;color:var(--tx);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${file.name}</div>
          <div style="font-size:10px;color:var(--tx3)">${(file.size/1024).toFixed(0)} KB</div>
        </div>
      </div>`;
    };
    reader.readAsDataURL(file);
  } else {
    prev.innerHTML = `<div style="margin-top:8px;padding:8px 10px;background:var(--bg3s);border:1px solid var(--bd);border-radius:6px;font-size:11px">📄 ${file.name} · ${(file.size/1024).toFixed(0)} KB</div>`;
  }
}

async function submitReportPayment() {
  const data = window._debtData;
  if (!data || !data.debt || !sb) return;
  const debt = data.debt;
  const amt   = parseFloat(document.getElementById('rp-amt').value);
  const date  = document.getElementById('rp-date').value;
  const notes = document.getElementById('rp-notes').value.trim();
  const file  = document.getElementById('rp-file')?.files[0];
  const errEl = document.getElementById('rp-err');
  const btn   = document.getElementById('rp-submit');

  errEl.style.display = 'none';
  if (!amt || amt <= 0) { errEl.textContent = 'Ingresa un monto válido'; errEl.style.display='block'; return; }
  if (!date) { errEl.textContent = 'Ingresa la fecha del pago'; errEl.style.display='block'; return; }

  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    let receiptUrl = null;
    if (file) {
      btn.textContent = '📤 Subiendo comprobante...';
      const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
      const path = `_borrower/${debt.id}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
      const { error: upErr } = await sb.storage.from('payment-receipts').upload(path, file, {
        contentType: file.type || 'image/jpeg',
        upsert: false,
      });
      if (upErr) throw new Error('Error al subir comprobante: ' + upErr.message);
      const { data: pub } = sb.storage.from('payment-receipts').getPublicUrl(path);
      receiptUrl = pub.publicUrl;
    }

    btn.textContent = 'Registrando pago...';
    const payment = {
      id: 'rp-' + Date.now() + '-' + Math.random().toString(36).slice(2,6),
      debt_id: debt.id,
      user_id: null,
      amount: amt,
      payment_date: date,
      notes: notes || `Pago reportado por ${debt.borrower_name || 'deudor'}`,
      receipt_url: receiptUrl,
      status: 'pending',
      reported_by: 'borrower',
    };
    const { error: insErr } = await sb.from('payments').insert(payment);
    if (insErr) throw new Error('Error al registrar: ' + insErr.message);

    // Mostrar mensaje de éxito y cerrar
    document.getElementById('modal-container').innerHTML = `<div class="mover"><div class="modal" style="max-width:420px;text-align:center">
      <div class="mbd" style="padding:32px 22px">
        <div style="font-size:48px;margin-bottom:12px">✅</div>
        <div style="font-family:var(--fh);font-size:18px;font-weight:700;color:var(--gn);margin-bottom:8px">¡Pago reportado!</div>
        <div style="font-size:13px;color:var(--tx2);margin-bottom:8px">El acreedor recibirá la notificación y revisará tu pago.</div>
        <div style="font-size:11px;color:var(--tx3)">Aparecerá en el historial como <strong>"Por aprobar"</strong>. Una vez confirmado el dinero, cambiará a "Aprobado" y se descontará de tu saldo.</div>
      </div>
      <div class="mft" style="justify-content:center"><button class="btn-x btn-confirm" onclick="closeModal();location.reload()">Entendido</button></div>
    </div></div>`;
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '📤 Enviar reporte';
    errEl.textContent = e.message || 'Error al enviar';
    errEl.style.display = 'block';
  }
}

/* ═══════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════ */
async function init() {
  const token = getToken();
  if (!token) {
    renderError('Link inválido', 'No se proporcionó un token. Solicita un link válido al acreedor.');
    return;
  }
  try {
    const data = await fetchPublicDebt(token);
    if (!data || !data.debt) {
      renderError('Deuda no encontrada', 'El link expiró, fue regenerado, o el token es incorrecto. Solicita un nuevo link al acreedor.');
      return;
    }
    renderPublic(data);
  } catch (e) {
    console.error(e);
    renderError('Error al cargar', e.message || 'Hubo un problema. Intenta nuevamente más tarde.');
  }
}
init();
</script>
</body>
</html>
